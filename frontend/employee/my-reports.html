<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="myreports.title">我的报销</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script>
    window.AUTH_MODE = "mock";
    window.API_BASE  = "";
  </script>
  <style>
    .reports-wrap { max-width: 880px; margin: 1.5rem auto; padding: 0 1rem; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
    .top-bar h1 { font-size: 1.3rem; margin: 0; }
    .report-card {
      background: white; border: 1px solid #e2e8f0; border-radius: 12px;
      margin-bottom: 1rem; overflow: hidden;
    }
    .report-card.open { border-color: #0f172a; }
    .report-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.2rem; border-bottom: 1px solid #f1f5f9;
    }
    .report-title { font-weight: 700; color: #0f172a; font-size: 1rem; }
    .report-meta  { color: #94a3b8; font-size: .75rem; margin-top: .2rem; }
    .rstatus {
      display: inline-block; padding: .2rem .5rem; border-radius: 6px;
      font-size: .72rem; font-weight: 600;
    }
    .rstatus.open      { background: #dbeafe; color: #1e40af; }
    .rstatus.pending   { background: #fef3c7; color: #92400e; }
    .rstatus.approved, .rstatus.manager_approved, .rstatus.finance_approved
                        { background: #dcfce7; color: #166534; }
    .rstatus.rejected  { background: #fee2e2; color: #991b1b; }
    .rstatus.withdrawn { background: #f1f5f9; color: #475569; }
    .rstatus.needs_revision { background: #fff7ed; color: #c2410c; }
    .revision-banner {
      background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px;
      padding: .6rem .8rem; margin: 0 1.2rem .5rem; font-size: .82rem; color: #c2410c;
    }
    .rstatus.exported  { background: #e0e7ff; color: #3730a3; }

    .line-list { list-style: none; padding: 0; margin: 0; }
    .line {
      display: flex; justify-content: space-between; align-items: center;
      padding: .65rem 1.2rem; border-bottom: 1px solid #f8fafc;
      font-size: .85rem;
    }
    .line:last-child { border-bottom: none; }
    .line .m { flex: 1; color: #0f172a; }
    .line .d { color: #94a3b8; font-size: .75rem; margin-right: .8rem; }
    .line .a { font-weight: 700; color: #0f172a; min-width: 90px; text-align: right; }
    .line.draft { background: #fffbeb; }
    .line.draft .m::after { content: attr(data-draft-suffix); color: #b45309; font-size: .7rem; }
    .empty-lines { padding: 1.2rem; color: #94a3b8; text-align: center; font-size: .8rem; }

    .report-foot {
      display: flex; justify-content: space-between; align-items: center;
      padding: .7rem 1.2rem; background: #fafafa; border-top: 1px solid #f1f5f9;
    }
    .total { font-weight: 700; color: #0f172a; }
    .actions { display: flex; gap: .5rem; }
    .btn-primary {
      background: #18b48e; color: white; border: none;
      padding: .5rem 1rem; border-radius: 8px; font-weight: 600;
      cursor: pointer; font-size: .85rem;
    }
    .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }
    .btn-ghost {
      background: white; color: #0f172a; border: 1px solid #cbd5e1;
      padding: .5rem 1rem; border-radius: 8px; font-weight: 600;
      cursor: pointer; font-size: .85rem; text-decoration: none;
    }
    .btn-danger {
      background: #dc2626; color: white; border: none;
      padding: .5rem 1rem; border-radius: 8px; font-weight: 600;
      cursor: pointer; font-size: .85rem;
    }

    /* Auto-rules suggestion panel — #5 user behavior learning */
    .ar-panel {
      background: linear-gradient(135deg, #f0f9ff 0%, #faf5ff 100%);
      border: 1px solid #c7d2fe; border-radius: 12px;
      padding: 1rem 1.2rem; margin-bottom: 1.2rem;
    }
    .ar-panel-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: .4rem;
    }
    .ar-panel-title { font-weight: 700; color: #4338ca; font-size: .95rem; }
    .ar-panel-hint  { color: #475569; font-size: .8rem; margin-bottom: .8rem; }
    .ar-refresh {
      background: white; color: #4338ca; border: 1px solid #c7d2fe;
      padding: .35rem .7rem; border-radius: 6px; font-size: .78rem;
      font-weight: 600; cursor: pointer;
    }
    .ar-refresh:hover { background: #eef2ff; }
    .ar-card {
      background: white; border: 1px solid #e2e8f0;
      border-left: 3px solid #6366f1;
      border-radius: 8px; padding: .7rem .9rem; margin-bottom: .55rem;
      display: flex; justify-content: space-between; align-items: center;
      gap: .8rem;
    }
    .ar-card.active { border-left-color: #16a34a; background: #f0fdf4; }
    .ar-card-text { flex: 1; }
    .ar-card-rule { font-size: .9rem; color: #0f172a; }
    .ar-card-rule code {
      background: rgba(99,102,241,.1); padding: 1px 5px; border-radius: 3px;
      font-family: ui-monospace, monospace; font-size: .85em;
    }
    .ar-card-meta { font-size: .72rem; color: #64748b; margin-top: .2rem; }
    .ar-conf-badge {
      display: inline-block; padding: 1px 6px; border-radius: 999px;
      background: #ede9fe; color: #5b21b6; font-weight: 600;
      margin-right: .4rem;
    }
    .ar-active-badge {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      background: #dcfce7; color: #166534; font-weight: 600;
      font-size: .72rem;
    }
    .ar-card-actions { display: flex; gap: .35rem; }
    .ar-btn-accept {
      background: #4338ca; color: white; border: none;
      padding: .35rem .8rem; border-radius: 6px; font-weight: 600;
      font-size: .78rem; cursor: pointer;
    }
    .ar-btn-dismiss {
      background: white; color: #64748b; border: 1px solid #cbd5e1;
      padding: .35rem .8rem; border-radius: 6px; font-weight: 600;
      font-size: .78rem; cursor: pointer;
    }
    .ar-empty { color: #64748b; font-size: .82rem; padding: .5rem 0; }
    .ar-toggle-active {
      background: none; border: none; color: #4338ca;
      font-size: .78rem; cursor: pointer; padding: .3rem 0;
      text-align: left;
    }
  </style>
</head>
<body>
  <div id="nav-root"></div>
  <script src="/shared/i18n.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/nav.js"></script>

  <main class="reports-wrap">
    <div class="top-bar">
      <h1 data-i18n="myreports.title">我的报销单</h1>
      <div style="display:flex; gap:.5rem">
        <button class="btn-ghost" onclick="newReport()" data-i18n="myreports.new-btn">+ 新建报销单</button>
        <a href="/employee/quick.html" class="btn-primary" style="text-decoration:none" data-i18n="myreports.quick-link">快速添加发票 →</a>
      </div>
    </div>

    <div id="auto-rules-panel"></div>

    <div id="reports-body">
      <div style="text-align:center; padding:2rem; color:#94a3b8" data-i18n="myreports.loading">加载中…</div>
    </div>
  </main>

<script>
const authH = async () => (window.auth ? await window.auth.getHeaders() : {});
const fmtMoney = (c, a) => `${c || "CNY"} ${Number(a || 0).toFixed(2)}`;
const STATUS_LABEL = {
  open: t('myreports.status-open'), pending: t('myreports.status-pending'),
  approved: t('myreports.status-approved'), manager_approved: t('myreports.status-mgr'),
  finance_approved: t('myreports.status-fin'),
  rejected: t('myreports.status-rejected'), needs_revision: t('myreports.status-revision'),
  withdrawn: t('myreports.status-withdrawn'), exported: t('myreports.status-exported'),
};

async function load() {
  const r = await fetch("/api/reports", { headers: await authH() });
  if (!r.ok) {
    document.getElementById("reports-body").innerHTML =
      `<div style="text-align:center;padding:2rem;color:#dc2626">${t('myreports.load-fail')}${r.status}</div>`;
    return;
  }
  const { items } = await r.json();
  render(items);
  // Load auto-rules in parallel — failure is silent (panel stays hidden).
  loadAutoRules();
}

// ── Auto-rules (#5 user behavior learning) ────────────────────────
//
// The miner runs server-side; this just lists, mines on demand, and
// posts accept/dismiss. The panel hides itself when there's nothing to
// show AND no active rules to summarize, so we don't pollute the page
// for new users.

let _arShowActive = false;

function fieldLabel(f) {
  return t('autorules.field.' + f) || f;
}

function ruleSentence(r) {
  return t('autorules.rule-text')
    .replace('{merchant}', `<code>${escapeHtml(r.trigger_value)}</code>`)
    .replace('{field}', fieldLabel(r.field))
    .replace('{value}', `<code>${escapeHtml(r.value)}</code>`);
}

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

async function loadAutoRules() {
  const panel = document.getElementById("auto-rules-panel");
  if (!panel) return;
  let body;
  try {
    const r = await fetch("/api/auto-rules", { headers: await authH() });
    if (!r.ok) { panel.innerHTML = ""; return; }
    body = await r.json();
  } catch { panel.innerHTML = ""; return; }
  renderAutoRules(body);
}

async function refreshAutoRules() {
  const panel = document.getElementById("auto-rules-panel");
  panel.innerHTML = `<div class="ar-panel"><div class="ar-empty">${t('autorules.loading')}</div></div>`;
  try {
    const r = await fetch("/api/auto-rules/mine", {
      method: "POST", headers: await authH(),
    });
    if (!r.ok) { await loadAutoRules(); return; }
  } catch {}
  await loadAutoRules();
}

function renderAutoRules(body) {
  const panel = document.getElementById("auto-rules-panel");
  const items = body.items || [];
  const suggested = items.filter(r => r.status === "suggested");
  const active = items.filter(r => r.status === "active");

  // Hide the panel entirely if there's nothing to show.
  if (suggested.length === 0 && active.length === 0) {
    panel.innerHTML = "";
    return;
  }

  const suggestionCards = suggested.map(r => `
    <div class="ar-card">
      <div class="ar-card-text">
        <div class="ar-card-rule">${ruleSentence(r)}</div>
        <div class="ar-card-meta">
          <span class="ar-conf-badge">${t('autorules.confidence')} ${Math.round((r.confidence || 0) * 100)}%</span>
          ${t('autorules.evidence-count').replace('{n}', r.evidence_count || 0)}
        </div>
      </div>
      <div class="ar-card-actions">
        <button class="ar-btn-dismiss" onclick="dismissRule('${r.id}')">${t('autorules.btn-dismiss')}</button>
        <button class="ar-btn-accept" onclick="acceptRule('${r.id}')">${t('autorules.btn-accept')}</button>
      </div>
    </div>`).join("");

  const activeCards = (_arShowActive ? active : []).map(r => `
    <div class="ar-card active">
      <div class="ar-card-text">
        <div class="ar-card-rule">${ruleSentence(r)}</div>
        <div class="ar-card-meta">
          <span class="ar-active-badge">${t('autorules.active-label')}</span>
          ${t('autorules.applied-count').replace('{n}', r.applied_count || 0)}
        </div>
      </div>
    </div>`).join("");

  const toggleLabel = _arShowActive
    ? t('autorules.hide-active')
    : t('autorules.show-active').replace('{n}', active.length);

  panel.innerHTML = `
    <div class="ar-panel">
      <div class="ar-panel-head">
        <div class="ar-panel-title">${t('autorules.section-title')}</div>
        <button class="ar-refresh" onclick="refreshAutoRules()">${t('autorules.refresh-btn')}</button>
      </div>
      ${suggested.length ? `<div class="ar-panel-hint">${t('autorules.section-hint')}</div>` : ""}
      ${suggestionCards}
      ${suggested.length === 0 ? `<div class="ar-empty">${t('autorules.empty')}</div>` : ""}
      ${active.length ? `
        <button class="ar-toggle-active" onclick="toggleActive()">${toggleLabel}</button>
        ${activeCards}
      ` : ""}
    </div>`;
}

function toggleActive() {
  _arShowActive = !_arShowActive;
  loadAutoRules();
}

async function acceptRule(id) {
  const r = await fetch(`/api/auto-rules/${id}/accept`, {
    method: "POST", headers: await authH(),
  });
  if (!r.ok) { alert(t('autorules.accept-fail') + r.status); return; }
  await loadAutoRules();
}

async function dismissRule(id) {
  const r = await fetch(`/api/auto-rules/${id}/dismiss`, {
    method: "POST", headers: await authH(),
  });
  if (!r.ok) { alert(t('autorules.dismiss-fail') + r.status); return; }
  await loadAutoRules();
}

function render(items) {
  const el = document.getElementById("reports-body");
  if (!items.length) {
    el.innerHTML = `<div style="text-align:center;padding:2rem;color:#94a3b8">${t('myreports.empty')}</div>`;
    return;
  }
  items.sort((a, b) => {
    const order = { open: 0, needs_revision: 0.5, pending: 1, approved: 2, manager_approved: 2,
                    finance_approved: 2, rejected: 3, withdrawn: 4, exported: 5 };
    return (order[a.status] ?? 9) - (order[b.status] ?? 9);
  });
  el.innerHTML = items.map(renderCard).join("");
}

function renderCard(r) {
  const isOpen = r.status === "open";
  const isPendingOrApproved = ["pending", "approved", "manager_approved", "finance_approved"].includes(r.status);
  const lines = (r.lines || []).concat((r.pending_drafts || []).map(d => ({...d, status: "draft"})));
  const lineCount = r.line_count + (r.pending_drafts || []).length;
  const draftSuffix = t('myreports.draft-suffix');
  const linesHTML = lines.length === 0
    ? `<div class="empty-lines">${t('myreports.empty-lines')}</div>`
    : `<ul class="line-list">${lines.slice(0, 5).map(l => `
        <li class="line ${l.status === 'draft' ? 'draft' : ''}">
          <span class="d">${l.date || "—"}</span>
          <span class="m" data-draft-suffix="${draftSuffix}">${l.merchant || "—"}</span>
          <span class="a">${fmtMoney(l.currency, l.amount)}</span>
        </li>`).join("")}${lines.length > 5 ? `<li class="line" style="color:#94a3b8;font-size:.8rem;justify-content:center">${t('myreports.more-lines').replace('{n}', lines.length - 5)}</li>` : ""}</ul>`;

  const total = `≈ ${fmtMoney(r.home_currency || "CNY", r.total_converted != null ? r.total_converted : (r.total_amount || 0))}`;
  const detailUrl = `/employee/report.html?report_id=${r.id}`;
  const actions = [];
  if (isOpen) {
    actions.push(`<a href="${detailUrl}" class="btn-ghost" onclick="event.stopPropagation()">${t('myreports.btn-detail')}</a>`);
    if (lineCount === 0) {
      actions.push(`<button class="btn-danger" onclick="event.stopPropagation();deleteReport('${r.id}')">${t('myreports.btn-delete')}</button>`);
    }
    actions.push(`<button class="btn-primary" onclick="event.stopPropagation();submitReport('${r.id}')" ${lines.length ? '' : 'disabled'}>${t('myreports.btn-submit')}</button>`);
  }
  if (isPendingOrApproved) {
    actions.push(`<a href="${detailUrl}" class="btn-ghost" onclick="event.stopPropagation()">${t('myreports.btn-detail')}</a>`);
    actions.push(`<button class="btn-danger" onclick="event.stopPropagation();withdrawReport('${r.id}')">${t('myreports.btn-withdraw')}</button>`);
  }
  const isNeedsRevision = r.status === "needs_revision";
  if (isNeedsRevision) {
    actions.push(`<a href="${detailUrl}" class="btn-ghost" onclick="event.stopPropagation()">${t('myreports.btn-edit')}</a>`);
    actions.push(`<button class="btn-primary" onclick="event.stopPropagation();resubmitReport('${r.id}')">${t('myreports.btn-resubmit')}</button>`);
  }
  if (!isOpen && !isPendingOrApproved && !isNeedsRevision) {
    actions.push(`<a href="${detailUrl}" class="btn-ghost" onclick="event.stopPropagation()">${t('myreports.btn-detail')}</a>`);
  }

  return `
    <div class="report-card ${isOpen ? 'open' : ''}" onclick="window.location.href='${detailUrl}'" style="cursor:pointer">
      <div class="report-head">
        <div>
          <div class="report-title">${r.title}</div>
          <div class="report-meta">${t('myreports.line-count').replace('{n}', lineCount)} · ${new Date(r.created_at).toLocaleDateString()}</div>
        </div>
        <span class="rstatus ${r.status}">${STATUS_LABEL[r.status] || r.status}</span>
      </div>
      ${linesHTML}
      ${r.status === "needs_revision" && r.revision_reason ? `<div class="revision-banner">${t('myreports.revision-reason')}${r.revision_reason}</div>` : ""}
      <div class="report-foot">
        <div class="total">${t('myreports.total-prefix')} ${total}</div>
        <div class="actions">${actions.join("")}</div>
      </div>
    </div>`;
}

async function newReport() {
  const defaultTitle = `${new Date().getMonth()+1}${t('myreports.new-default')}`;
  const title = prompt(t('myreports.new-prompt'), defaultTitle);
  if (title === null) return;
  const r = await fetch("/api/reports", {
    method: "POST",
    headers: { "Content-Type": "application/json", ...(await authH()) },
    body: JSON.stringify({ title: title || t('myreports.new-fallback') }),
  });
  if (!r.ok) { alert(t('myreports.create-fail') + r.status); return; }
  const body = await r.json();
  window.location.href = `/employee/report.html?report_id=${body.id}`;
}

async function submitReport(reportId) {
  if (!confirm(t('myreports.submit-confirm'))) return;
  const r = await fetch(`/api/reports/${reportId}/submit`, {
    method: "POST", headers: await authH(),
  });
  if (!r.ok) {
    let msg = t('myreports.submit-fail') + r.status;
    try {
      const body = await r.json();
      if (body.detail) msg = body.detail;
    } catch {}
    alert(msg);
    return;
  }
  await load();
}

async function deleteReport(reportId) {
  if (!confirm(t('myreports.delete-confirm'))) return;
  const r = await fetch(`/api/reports/${reportId}`, {
    method: "DELETE", headers: await authH(),
  });
  if (!r.ok) {
    let msg = t('myreports.delete-fail') + r.status;
    try {
      const body = await r.json();
      if (body.detail) msg = body.detail;
    } catch {}
    alert(msg);
    return;
  }
  await load();
}

async function withdrawReport(reportId) {
  if (!confirm(t('myreports.withdraw-confirm'))) return;
  const r = await fetch(`/api/reports/${reportId}/withdraw`, {
    method: "POST", headers: await authH(),
  });
  if (!r.ok) {
    alert(t('myreports.withdraw-fail') + r.status);
    return;
  }
  const body = await r.json();
  if (body.was_approved) {
    alert(t('myreports.withdraw-was-approved'));
  }
  await load();
}

async function resubmitReport(reportId) {
  if (!confirm(t('myreports.resubmit-confirm'))) return;
  const r = await fetch(`/api/reports/${reportId}/resubmit`, {
    method: "POST", headers: await authH(),
  });
  if (!r.ok) {
    let msg = t('myreports.resubmit-fail') + r.status;
    try {
      const body = await r.json();
      if (body.detail) msg = body.detail;
    } catch {}
    alert(msg);
    return;
  }
  await load();
}

load();
</script>
<script src="/shared/ai-assistant.js"></script>
</body>
</html>
