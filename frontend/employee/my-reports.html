<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的报销 — ExpenseFlow</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script>
    window.AUTH_MODE = "mock";
    window.API_BASE  = "";
  </script>
  <style>
    .reports-wrap { max-width: 880px; margin: 1.5rem auto; padding: 0 1rem; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
    .top-bar h1 { font-size: 1.3rem; margin: 0; }
    .report-card {
      background: white; border: 1px solid #e2e8f0; border-radius: 12px;
      margin-bottom: 1rem; overflow: hidden;
    }
    .report-card.open { border-color: #0f172a; }
    .report-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.2rem; border-bottom: 1px solid #f1f5f9;
    }
    .report-title { font-weight: 700; color: #0f172a; font-size: 1rem; }
    .report-meta  { color: #94a3b8; font-size: .75rem; margin-top: .2rem; }
    .rstatus {
      display: inline-block; padding: .2rem .5rem; border-radius: 6px;
      font-size: .72rem; font-weight: 600;
    }
    .rstatus.open      { background: #dbeafe; color: #1e40af; }
    .rstatus.pending   { background: #fef3c7; color: #92400e; }
    .rstatus.approved, .rstatus.manager_approved, .rstatus.finance_approved
                        { background: #dcfce7; color: #166534; }
    .rstatus.rejected  { background: #fee2e2; color: #991b1b; }
    .rstatus.withdrawn { background: #f1f5f9; color: #475569; }
    .rstatus.exported  { background: #e0e7ff; color: #3730a3; }

    .line-list { list-style: none; padding: 0; margin: 0; }
    .line {
      display: flex; justify-content: space-between; align-items: center;
      padding: .65rem 1.2rem; border-bottom: 1px solid #f8fafc;
      font-size: .85rem;
    }
    .line:last-child { border-bottom: none; }
    .line .m { flex: 1; color: #0f172a; }
    .line .d { color: #94a3b8; font-size: .75rem; margin-right: .8rem; }
    .line .a { font-weight: 700; color: #0f172a; min-width: 90px; text-align: right; }
    .line.draft { background: #fffbeb; }
    .line.draft .m::after { content: " · 未扫描完成"; color: #b45309; font-size: .7rem; }
    .empty-lines { padding: 1.2rem; color: #94a3b8; text-align: center; font-size: .8rem; }

    .report-foot {
      display: flex; justify-content: space-between; align-items: center;
      padding: .7rem 1.2rem; background: #fafafa; border-top: 1px solid #f1f5f9;
    }
    .total { font-weight: 700; color: #0f172a; }
    .actions { display: flex; gap: .5rem; }
    .btn-primary {
      background: #18b48e; color: white; border: none;
      padding: .5rem 1rem; border-radius: 8px; font-weight: 600;
      cursor: pointer; font-size: .85rem;
    }
    .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }
    .btn-ghost {
      background: white; color: #0f172a; border: 1px solid #cbd5e1;
      padding: .5rem 1rem; border-radius: 8px; font-weight: 600;
      cursor: pointer; font-size: .85rem; text-decoration: none;
    }
    .btn-danger {
      background: #dc2626; color: white; border: none;
      padding: .5rem 1rem; border-radius: 8px; font-weight: 600;
      cursor: pointer; font-size: .85rem;
    }
  </style>
</head>
<body>
  <div id="nav-root"></div>
  <script src="/shared/i18n.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/nav.js"></script>

  <main class="reports-wrap">
    <div class="top-bar">
      <h1>我的报销单</h1>
      <div style="display:flex; gap:.5rem">
        <button class="btn-ghost" onclick="newReport()">+ 新建报销单</button>
        <a href="/employee/quick.html" class="btn-primary" style="text-decoration:none">快速添加发票 →</a>
      </div>
    </div>

    <div id="reports-body">
      <div style="text-align:center; padding:2rem; color:#94a3b8">加载中…</div>
    </div>
  </main>

<script>
const authH = async () => (window.auth ? await window.auth.getHeaders() : {});
const fmtMoney = (c, a) => `${c || "CNY"} ${Number(a || 0).toFixed(2)}`;
const STATUS_LABEL = {
  open: "开放中", pending: "审批中",
  approved: "已批准", manager_approved: "经理已批", finance_approved: "财务已批",
  rejected: "已拒绝", withdrawn: "已撤回", exported: "已入账",
};

async function load() {
  const r = await fetch("/api/reports", { headers: await authH() });
  if (!r.ok) {
    document.getElementById("reports-body").innerHTML =
      `<div style="text-align:center;padding:2rem;color:#dc2626">加载失败: ${r.status}</div>`;
    return;
  }
  const { items } = await r.json();
  render(items);
}

function render(items) {
  const el = document.getElementById("reports-body");
  if (!items.length) {
    el.innerHTML = `<div style="text-align:center;padding:2rem;color:#94a3b8">暂无报销单。点击「快速添加发票」开始。</div>`;
    return;
  }
  items.sort((a, b) => {
    const order = { open: 0, pending: 1, approved: 2, manager_approved: 2,
                    finance_approved: 2, rejected: 3, withdrawn: 4, exported: 5 };
    return (order[a.status] ?? 9) - (order[b.status] ?? 9);
  });
  el.innerHTML = items.map(renderCard).join("");
}

function renderCard(r) {
  const isOpen = r.status === "open";
  const isPendingOrApproved = ["pending", "approved", "manager_approved", "finance_approved"].includes(r.status);
  const lines = (r.lines || []).concat((r.pending_drafts || []).map(d => ({...d, status: "draft"})));
  const lineCount = r.line_count + (r.pending_drafts || []).length;
  const linesHTML = lines.length === 0
    ? `<div class="empty-lines">还没有费用，点击进入添加。</div>`
    : `<ul class="line-list">${lines.slice(0, 5).map(l => `
        <li class="line ${l.status === 'draft' ? 'draft' : ''}">
          <span class="d">${l.date || "—"}</span>
          <span class="m">${l.merchant || "—"}</span>
          <span class="a">${fmtMoney(l.currency, l.amount)}</span>
        </li>`).join("")}${lines.length > 5 ? `<li class="line" style="color:#94a3b8;font-size:.8rem;justify-content:center">还有 ${lines.length - 5} 笔…</li>` : ""}</ul>`;

  const total = `≈ ${fmtMoney(r.home_currency || "CNY", r.total_converted != null ? r.total_converted : (r.total_amount || 0))}`;
  const detailUrl = `/employee/report.html?report_id=${r.id}`;
  const actions = [];
  if (isOpen) {
    actions.push(`<a href="${detailUrl}" class="btn-ghost" onclick="event.stopPropagation()">查看详情</a>`);
    actions.push(`<button class="btn-primary" onclick="event.stopPropagation();submitReport('${r.id}')" ${lines.length ? '' : 'disabled'}>提交</button>`);
  }
  if (isPendingOrApproved) {
    actions.push(`<a href="${detailUrl}" class="btn-ghost" onclick="event.stopPropagation()">查看详情</a>`);
    actions.push(`<button class="btn-danger" onclick="event.stopPropagation();withdrawReport('${r.id}')">撤回</button>`);
  }
  if (!isOpen && !isPendingOrApproved) {
    actions.push(`<a href="${detailUrl}" class="btn-ghost" onclick="event.stopPropagation()">查看详情</a>`);
  }

  return `
    <div class="report-card ${isOpen ? 'open' : ''}" onclick="window.location.href='${detailUrl}'" style="cursor:pointer">
      <div class="report-head">
        <div>
          <div class="report-title">${r.title}</div>
          <div class="report-meta">${lineCount} 笔 · ${new Date(r.created_at).toLocaleDateString()}</div>
        </div>
        <span class="rstatus ${r.status}">${STATUS_LABEL[r.status] || r.status}</span>
      </div>
      ${linesHTML}
      <div class="report-foot">
        <div class="total">合计 ${total}</div>
        <div class="actions">${actions.join("")}</div>
      </div>
    </div>`;
}

async function newReport() {
  const title = prompt("报销单名称：", `${new Date().getMonth()+1}月报销`);
  if (title === null) return;
  const r = await fetch("/api/reports", {
    method: "POST",
    headers: { "Content-Type": "application/json", ...(await authH()) },
    body: JSON.stringify({ title: title || "新建报销单" }),
  });
  if (!r.ok) { alert("创建失败: " + r.status); return; }
  const body = await r.json();
  window.location.href = `/employee/report.html?report_id=${body.id}`;
}

async function submitReport(reportId) {
  if (!confirm("确认提交这张报销单？提交后将进入审批流程。")) return;
  const r = await fetch(`/api/reports/${reportId}/submit`, {
    method: "POST", headers: await authH(),
  });
  if (!r.ok) {
    let msg = "提交失败: " + r.status;
    try {
      const body = await r.json();
      if (body.detail) msg = body.detail;
    } catch {}
    alert(msg);
    return;
  }
  await load();
}

async function withdrawReport(reportId) {
  if (!confirm("确认撤回？所有发票将回到草稿状态，需重新提交审批。")) return;
  const r = await fetch(`/api/reports/${reportId}/withdraw`, {
    method: "POST", headers: await authH(),
  });
  if (!r.ok) {
    alert("撤回失败: " + r.status);
    return;
  }
  const body = await r.json();
  if (body.was_approved) {
    alert("已撤回（之前为已批准状态），经理将收到通知。");
  }
  await load();
}

load();
</script>
</body>
</html>
