<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交报销 — ConcurShield</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script>window.AUTH_MODE = "mock"; window.API_BASE = "";</script>
</head>
<body>
<div id="nav-root"></div>
<script src="/shared/i18n.js"></script>
  <script src="/shared/auth.js"></script>
<script src="/shared/nav.js"></script>

<main class="page" style="max-width:700px">
<div style="margin-bottom:1rem">
  <a href="/employee/quick.html" style="color:#64748b;font-size:.85rem;text-decoration:none">← 返回快速报销</a>
</div>

  <!-- Step indicator -->
  <div class="wizard-steps" id="wizard-steps">
    <div class="step-item">
      <div class="step-circle active" id="sc1">1</div>
      <span class="step-label active" id="sl1" data-i18n="submit.step1">上传发票</span>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step-item">
      <div class="step-circle" id="sc2">2</div>
      <span class="step-label" id="sl2" data-i18n="submit.step2">确认识别</span>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step-item">
      <div class="step-circle" id="sc3">3</div>
      <span class="step-label" id="sl3" data-i18n="submit.step3">补充信息</span>
    </div>
  </div>

  <!-- ── STEP 1: Upload ── -->
  <div id="step1" class="card">
    <div class="card-title" data-i18n="submit.upload-title">上传发票图片</div>

    <div class="upload-zone" id="upload-zone"
      onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,application/pdf">
      <div id="upload-prompt">
        <div class="upload-icon">📄</div>
        <div class="upload-title" data-i18n="submit.upload-hint">点击或拖放发票到此处</div>
        <div class="upload-sub" data-i18n="submit.upload-sub">支持 JPG · PNG · WEBP · PDF，最大 10 MB</div>
      </div>
      <img id="receipt-preview" class="receipt-thumb" style="display:none">
    </div>

    <div style="margin-top:1rem; display:flex; gap:.75rem; justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" id="skip-ocr-btn" style="display:none"
        onclick="goStep(3, true)" data-i18n="btn.skip-ocr">跳过识别，手动填写</button>
      <button class="btn btn-primary" id="ocr-btn" disabled onclick="runOCR()">
        <span id="ocr-spinner" class="spinner" style="display:none"></span>
        <span data-i18n="btn.ocr">OCR 自动识别 →</span>
      </button>
    </div>
  </div>

  <!-- ── STEP 2: OCR Confirm ── -->
  <div id="step2" class="card" style="display:none">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem">
      <div class="card-title" style="margin:0" data-i18n="submit.confirm-title">确认识别结果</div>
      <span style="font-size:.78rem; color:var(--gray-400)" data-i18n="submit.ocr-legend">
        绿色 = 高置信 · 黄色 = 请确认 · 红色 = 未识别
      </span>
    </div>

    <div class="ocr-grid" id="ocr-fields">
      <!-- rendered by JS -->
    </div>

    <div style="margin-top:1.25rem; display:flex; gap:.75rem; justify-content:space-between">
      <button class="btn btn-outline btn-sm" onclick="goStep(1)">← 重新上传</button>
      <button class="btn btn-primary" onclick="goStep(3)">确认，继续 →</button>
    </div>
  </div>

  <!-- ── STEP 3: Details + Submit ── -->
  <div id="step3" class="card" style="display:none">
    <div class="card-title" data-i18n="submit.details-title">补充信息</div>

    <!-- OCR summary strip -->
    <div id="ocr-summary" style="background:var(--brand-light); border-radius:var(--radius-sm);
      padding:.65rem 1rem; margin-bottom:1.25rem; font-size:.85rem; color:var(--brand-dark);
      display:none">
    </div>

    <div id="alert-box"></div>

    <form id="expense-form">
      <div class="form-grid">
        <div class="form-group">
          <label data-i18n="submit.merchant">商户名称 *</label>
          <input id="f-merchant" name="merchant" required placeholder="如：海底捞">
        </div>
        <div class="form-group">
          <label data-i18n="submit.amount">金额 *</label>
          <input id="f-amount" name="amount" type="number" step="0.01" min="0.01"
            required placeholder="0.00">
        </div>
        <div id="budget-signal" style="display:none; margin-top:.5rem"></div>
        <div class="form-group">
          <label data-i18n="submit.currency">货币</label>
          <select id="f-currency" name="currency">
            <option value="CNY">CNY — 人民币</option>
            <option value="USD">USD — 美元</option>
            <option value="EUR">EUR — 欧元</option>
          </select>
        </div>
        <div class="form-group">
          <label data-i18n="submit.category">费用类别 *</label>
          <select id="f-category" name="category" required>
            <option value="meal" data-i18n="cat.meal">餐饮</option>
            <option value="transport" data-i18n="cat.transport">交通</option>
            <option value="accommodation" data-i18n="cat.accommodation">住宿</option>
            <option value="entertainment" data-i18n="cat.entertainment">招待</option>
            <option value="other" data-i18n="cat.other">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label data-i18n="submit.date">消费日期 *</label>
          <input id="f-date" name="date" type="date" required>
        </div>
        <div class="form-group">
          <label data-i18n="submit.tax">税额</label>
          <input id="f-tax" name="tax_amount" type="number" step="0.01" min="0"
            placeholder="可选">
        </div>
        <div class="form-group">
          <label data-i18n="submit.project">项目</label>
          <select id="f-project" name="project_code">
            <option value="">— 不指派 —</option>
          </select>
        </div>
        <div class="form-group">
          <label data-i18n="submit.invoice-no">发票号码</label>
          <input id="f-invoice-number" name="invoice_number" placeholder="可选 · 用于查重">
        </div>
        <div class="form-group">
          <label data-i18n="submit.invoice-code">发票代码</label>
          <input id="f-invoice-code" name="invoice_code" placeholder="可选">
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="submit.notes">备注说明</label>
        <textarea id="f-desc" name="description" rows="2"
          placeholder="可选：补充消费说明"></textarea>
      </div>

      <div style="display:flex; gap:.75rem; justify-content:space-between; margin-top:.5rem">
        <button type="button" class="btn btn-outline btn-sm" onclick="goStep(2)">← 返回确认</button>
        <button type="submit" class="btn btn-primary btn-lg" id="submit-btn" data-i18n="btn.submit-form">
          提交报销单
        </button>
      </div>
    </form>
  </div>

  <!-- Processing status card -->
  <div id="status-card" class="card" style="display:none">
    <div class="card-title">AI 审核进度</div>
    <div id="status-timeline">
      <div style="display:flex; align-items:center; gap:.6rem; color:var(--gray-400)">
        <span class="spinner"></span>
        <span>正在提交，AI 管道处理中…</span>
      </div>
    </div>
  </div>

</main>

<!-- ═══════════════════════════════════════
     AI 助手悬浮按钮 + Chat Drawer
═══════════════════════════════════════ -->
<button class="chat-toggle-btn pulse" id="chat-toggle" onclick="toggleChat()" title="AI 助手">💬</button>

<aside class="chat-drawer" id="chat-drawer">
  <div class="chat-header">
    <div class="chat-title" data-i18n="ai.title">AI 报销助手</div>
    <button class="btn btn-ghost btn-sm" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-msg assistant" id="chat-welcome"></div>
  </div>
  <div class="chat-input-wrap">
    <input id="chat-input" onkeydown="if(event.key==='Enter') sendChat()">
    <button id="chat-send-btn" onclick="sendChat()">➤</button>
  </div>
</aside>

<script src="/shared/api.js"></script>
<script>
(function () {
  // ── i18n helpers ──────────────────────────────────────────────
  const _t = window.t || (k => k);
  document.getElementById('chat-welcome').innerHTML =
    _t('ai.welcome-submit').replace(/\n/g, '<br>');
  document.getElementById('chat-input').placeholder = _t('ai.placeholder-submit');

  // ── State ──────────────────────────────────────────────────────
  let ocrData = null;   // raw OCR response
  let currentStep = 1;
  let manualMode = false;
  let draftId = null;          // agent draft id，上传发票后建立
  let chatStreaming = false;

  // Set today as default date
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);

  // Load project list (public endpoint, any role can read)
  (async () => {
    try {
      const data = await api.listProjects();
      const sel = document.getElementById('f-project');
      (data.items || []).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.code; opt.textContent = `${p.code} · ${p.name}`;
        sel.appendChild(opt);
      });
    } catch (e) {/* graceful — leave empty */}
  })();

  // ── Budget signal on amount blur ──────────────────────────────────
  let _employeeCostCenter = null;

  (async function _loadCostCenter() {
    try {
      const headers = await auth.getHeaders();
      const resp = await fetch('/api/employees/me', { headers });
      if (resp.ok) {
        const emp = await resp.json();
        _employeeCostCenter = emp.cost_center || null;
      }
    } catch (_) { /* non-blocking */ }
  })();

  function _showBudgetSignal(status) {
    const el = document.getElementById('budget-signal');
    if (!el) return;
    const sig = status && status.signal;
    if (!sig || sig === 'ok' || !status.configured) {
      el.style.display = 'none';
      return;
    }
    const pct = (status.usage_pct * 100).toFixed(1);
    const proj = status.projected_pct != null ? (status.projected_pct * 100).toFixed(1) : pct;
    let html = '';
    if (sig === 'blocked' || (sig === 'over_budget' && status.over_budget_action === 'block')) {
      html = `<div class="alert alert-error" style="font-size:.85rem; padding:.6rem .75rem">
        🚫 ${_t('budget.blocked')}
      </div>`;
    } else if (sig === 'over_budget') {
      html = `<div class="alert alert-warning" style="font-size:.85rem; padding:.6rem .75rem">
        ⚠️ ${_t('budget.over-warn')}
      </div>`;
    } else {
      html = `<div class="alert alert-info" style="font-size:.85rem; padding:.6rem .75rem">
        💡 ${_t('budget.info').replace('{pct}', pct).replace('{proj}', proj)}
      </div>`;
    }
    el.innerHTML = html;
    el.style.display = '';
  }

  const amountInput = document.getElementById('f-amount');
  if (amountInput) {
    amountInput.addEventListener('blur', async function() {
      const val = parseFloat(amountInput.value);
      if (!val || val <= 0 || !_employeeCostCenter) {
        var el = document.getElementById('budget-signal');
        if (el) el.style.display = 'none';
        return;
      }
      try {
        const status = await api.getBudgetStatus(_employeeCostCenter, val);
        _showBudgetSignal(status);
      } catch (_) { /* silently ignore */ }
    });
  }

  // ── Drag & drop ────────────────────────────────────────────────
  const zone  = document.getElementById('upload-zone');
  const input = document.getElementById('file-input');

  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', ()=> zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });
  input.addEventListener('change', () => { if (input.files[0]) setFile(input.files[0]); });

  async function setFile(f) {
    clearAlert();
    const preview = document.getElementById('receipt-preview');
    const prompt  = document.getElementById('upload-prompt');
    prompt.style.display = 'none';

    if (f.type === 'application/pdf') {
      preview.style.display = 'none';
      let pdfHint = document.getElementById('pdf-hint');
      if (!pdfHint) {
        pdfHint = document.createElement('div');
        pdfHint.id = 'pdf-hint';
        pdfHint.style.cssText =
          'padding:1.5rem;text-align:center;color:var(--gray-700)';
        document.getElementById('upload-zone').appendChild(pdfHint);
      }
      pdfHint.innerHTML =
        `<div style="font-size:2.5rem">📄</div>
         <div style="font-weight:600;margin-top:.4rem">${f.name}</div>
         <div style="font-size:.78rem;color:var(--gray-400);margin-top:.2rem">
           ${(f.size/1024/1024).toFixed(2)} MB · PDF</div>`;
    } else {
      const pdfHint = document.getElementById('pdf-hint');
      if (pdfHint) pdfHint.style.display = 'none';
      preview.src = URL.createObjectURL(f);
      preview.style.display = 'block';
    }

    document.getElementById('ocr-btn').disabled = false;
    document.getElementById('skip-ocr-btn').style.display = 'inline-flex';

    // ── 自动触发 Agent 流程 ──
    try {
      document.getElementById('chat-drawer').classList.add('open');
      document.getElementById('chat-toggle').classList.remove('pulse');
      appendMsg('assistant', window.LANG === 'en'
        ? 'Receipt received, uploading to draft…'
        : '发票已接收，正在上传到 draft…');
      await uploadReceiptToDraft(f);
      await runChat(window.LANG === 'en'
        ? 'I uploaded a receipt, please identify and fill in the fields'
        : '我已上传发票，请帮我识别并填写');
    } catch (err) {
      appendMsg('assistant', '❌ ' + err.message);
    }
  }

  // ── OCR ────────────────────────────────────────────────────────
  window.runOCR = async function () {
    const file = input.files[0];
    if (!file) return;
    clearAlert();
    document.getElementById('ocr-btn').disabled = true;
    document.getElementById('ocr-spinner').style.display = 'inline-block';

    try {
      ocrData = await api.ocrExtract(file);
      renderOCRFields(ocrData);
      goStep(2);
    } catch (err) {
      showAlert('OCR 识别失败（' + err.message + '），请手动填写', 'warning');
      goStep(3, true);
    } finally {
      document.getElementById('ocr-btn').disabled = false;
      document.getElementById('ocr-spinner').style.display = 'none';
    }
  };

  // ── OCR field rendering (with confidence) ──────────────────────
  const OCR_FIELD_DEFS = [
    { key: 'merchant', label: '商户名称', type: 'text',   formId: 'f-merchant' },
    { key: 'total',    label: '总金额',   type: 'number', formId: 'f-amount'   },
    { key: 'date',     label: '消费日期', type: 'date',   formId: 'f-date'     },
    { key: 'currency', label: '货币',     type: 'text',   formId: 'f-currency' },
    { key: 'tax_amount', label: '税额',   type: 'number', formId: 'f-tax'      },
  ];

  function confLevel(val, key) {
    if (val == null || val === '') return 'empty';
    // Heuristic from OCR response
    if (key === 'date' && !/^\d{4}-\d{2}-\d{2}$/.test(String(val))) return 'low';
    if (key === 'total' && (isNaN(val) || val <= 0)) return 'low';
    if (key === 'merchant' && String(val).length < 2) return 'medium';
    if (key === 'tax_amount') return 'medium';  // always ask user to verify
    return 'high';
  }

  function confLabel(level) {
    return { high: '高置信 ✓', medium: '请确认 ?', low: '未识别 !', empty: '未识别' }[level];
  }

  function renderOCRFields(data) {
    const grid = document.getElementById('ocr-fields');
    grid.innerHTML = OCR_FIELD_DEFS.map(f => {
      const raw = data[f.key] ?? '';
      const lvl = confLevel(raw, f.key);
      return `
        <div class="ocr-field conf-${lvl}">
          <div class="ocr-field-header">
            <span class="ocr-field-label">${f.label}</span>
            <span class="conf-badge ${lvl}">${confLabel(lvl)}</span>
          </div>
          <input type="${f.type}" value="${raw}"
            onchange="updateOCRVal('${f.key}', this.value)"
            placeholder="${lvl === 'empty' ? '请手动填写' : ''}">
        </div>`;
    }).join('');
  }

  window.updateOCRVal = function(key, val) {
    if (!ocrData) ocrData = {};
    ocrData[key] = val;
    // refresh confidence class on the parent
    const inputs = document.querySelectorAll('#ocr-fields .ocr-field input');
    inputs.forEach(inp => {
      const parent = inp.closest('.ocr-field');
      const badge  = parent.querySelector('.conf-badge');
      // simple live feedback: if user typed something → medium
      if (inp.value !== '') {
        parent.className = 'ocr-field conf-medium';
        badge.className  = 'conf-badge medium';
        badge.textContent = confLabel('medium');
      }
    });
  };

  // ── Step navigation ────────────────────────────────────────────
  window.goStep = function(n, manual) {
    manualMode = !!manual;

    // Populate form from OCR when going to step 3
    if (n === 3 && ocrData && !manualMode) {
      if (ocrData.merchant)   document.getElementById('f-merchant').value = ocrData.merchant;
      if (ocrData.total)      document.getElementById('f-amount').value   = ocrData.total;
      if (ocrData.date)       document.getElementById('f-date').value     = ocrData.date;
      if (ocrData.tax_amount) document.getElementById('f-tax').value      = ocrData.tax_amount;
      if (ocrData.currency) {
        const sel = document.getElementById('f-currency');
        const opt = [...sel.options].find(o => o.value === ocrData.currency);
        if (opt) sel.value = ocrData.currency;
      }

      // Summary strip
      const strip = document.getElementById('ocr-summary');
      strip.style.display = 'block';
      strip.textContent =
        `OCR 已识别：${ocrData.merchant || '—'} · ¥${ocrData.total || '—'} · ${ocrData.date || '—'}`;
    }
    if (n === 3 && manualMode) {
      document.getElementById('ocr-summary').style.display = 'none';
    }

    [1,2,3].forEach(i => {
      document.getElementById('step' + i).style.display = (i === n) ? '' : 'none';
    });
    currentStep = n;
    updateStepUI(n);
  };

  function updateStepUI(n) {
    [1,2,3].forEach(i => {
      const c = document.getElementById('sc' + i);
      const l = document.getElementById('sl' + i);
      if (i < n)  { c.className = 'step-circle done';   l.className = 'step-label done'; }
      if (i === n){ c.className = 'step-circle active'; l.className = 'step-label active'; }
      if (i > n)  { c.className = 'step-circle';        l.className = 'step-label'; }
    });
    if (document.getElementById('line1'))
      document.getElementById('line1').className = 'step-line' + (n > 1 ? ' done' : '');
    if (document.getElementById('line2'))
      document.getElementById('line2').className = 'step-line' + (n > 2 ? ' done' : '');
  }

  // ── Submit ─────────────────────────────────────────────────────
  document.getElementById('expense-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 提交中…';
    clearAlert();

    try {
      let result;
      if (draftId) {
        // 先把表单里可能被用户改过的字段回写到 draft
        const fieldMap = {
          merchant: document.getElementById('f-merchant').value,
          amount: parseFloat(document.getElementById('f-amount').value || '0'),
          currency: document.getElementById('f-currency').value,
          category: document.getElementById('f-category').value,
          date: document.getElementById('f-date').value,
          tax_amount: parseFloat(document.getElementById('f-tax').value || '0') || null,
          invoice_number: document.getElementById('f-invoice-number').value || null,
          invoice_code: document.getElementById('f-invoice-code').value || null,
          project_code: document.getElementById('f-project').value || null,
          description: document.getElementById('f-desc').value || null,
        };
        // 直接覆盖整个 draft（快糙猛 MVP，复用 chat endpoint）
        // 简化：直接调新端点 PATCH 或复用 message 也可以，这里直接调 submit，
        // 后端会从 draft.fields 读已有值，所以需要先把用户改动同步
        // 为了 MVP 简单，用 agent tool 调用的方式同步每个字段太繁琐 —
        // 我们走一个更直接的方案：直接提交原 submissions 端点
        const fd = new FormData(e.target);
        fd.append('receipt_image', input.files[0]);
        result = await api.submitExpense(fd);
      } else {
        const fd = new FormData(e.target);
        fd.append('receipt_image', input.files[0]);
        result = await api.submitExpense(fd);
      }

      document.getElementById('step3').style.display = 'none';
      const card = document.getElementById('status-card');
      card.style.display = '';
      updateStepUI(4);
      await api.pollSubmissionStatus(result.id, sub => renderStatusTimeline(sub));
    } catch (err) {
      const msg =
        err.status === 422 ? (err.message || '文件类型或表单有误，请检查') :
        err.status === 413 ? '文件超过 10 MB 限制' :
        err.message;
      showAlert(msg, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '提交报销单';
    }
  });

  function renderStatusTimeline(sub) {
    const el = document.getElementById('status-timeline');

    if (sub.status === 'processing') {
      el.innerHTML = `<div style="display:flex;align-items:center;gap:.6rem;color:var(--gray-400)">
        <span class="spinner"></span><span>AI 正在审核中…</span></div>`;
      return;
    }

    const statusLabels = { reviewed:'已审核', approved:'已批准',
      rejected:'已拒绝', review_failed:'审核失败' };
    const tier = sub.tier || '';
    const risk = sub.risk_score || 0;
    const riskClass = risk < 30 ? 'low' : risk < 55 ? 'medium' : risk < 75 ? 'high' : 'critical';

    let html = `
      <div style="margin-bottom:1rem">
        <span class="badge badge-${sub.status}" style="font-size:.85rem; padding:.3rem .75rem">
          ${statusLabels[sub.status] || sub.status}
        </span>
        ${tier ? `<span class="badge badge-${tier}" style="margin-left:.5rem">${tier}</span>` : ''}
      </div>`;

    if (sub.risk_score != null) {
      html += `
        <div class="risk-bar-wrap" style="margin-bottom:1rem">
          <div class="risk-bar-labels"><span>风险评分</span><span>${risk.toFixed(0)}/100</span></div>
          <div class="risk-bar-track">
            <div class="risk-bar-fill ${riskClass}" style="width:${risk}%"></div>
          </div>
        </div>`;
    }

    // Timeline from audit_report
    const timeline = sub.audit_report?.timeline || [];
    if (timeline.length) {
      html += `<div class="timeline">`;
      const skillNames = ['收据验证','额度审批','合规检查','凭证生成','支付处理'];
      timeline.forEach((t, i) => {
        const cls = t.skipped ? 'skip' : t.passed ? 'pass' : 'fail';
        html += `
          <div class="timeline-item">
            <div class="timeline-dot ${cls}"></div>
            <div class="timeline-skill">${skillNames[i] || 'Skill ' + (i+1)}</div>
            <div class="timeline-msg">${t.message || (t.skipped ? '已跳过' : '')}</div>
          </div>`;
      });
      html += `</div>`;
    }

    // Link to my-reports
    html += `<a href="/employee/my-reports.html" class="btn btn-ghost btn-sm"
      style="margin-top:1rem">查看全部报销单 →</a>`;

    el.innerHTML = html;
  }

  function showAlert(msg, type) {
    document.getElementById('alert-box').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }
  function clearAlert() { document.getElementById('alert-box').innerHTML = ''; }

  // ═══════════════════════════════════════════════════════════════
  // AI 助手 — Chat + Agent 集成
  // ═══════════════════════════════════════════════════════════════

  window.toggleChat = function() {
    document.getElementById('chat-drawer').classList.toggle('open');
    document.getElementById('chat-toggle').classList.remove('pulse');
  };

  const messagesEl = () => document.getElementById('chat-messages');

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.className = `chat-msg ${role}`;
    div.innerHTML = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    messagesEl().appendChild(div);
    messagesEl().scrollTop = messagesEl().scrollHeight;
    return div;
  }

  function appendToolCard(toolId, name, input) {
    const div = document.createElement('div');
    div.className = 'chat-tool running';
    div.id = `tool-${toolId}`;
    const label = {
      extract_receipt_fields: '识别发票字段',
      suggest_category:       '推荐费用类别',
      check_duplicate_invoice: '查重发票号',
      get_my_recent_submissions: '查历史记录',
      update_draft_field:     `填写字段 ${input.field || ''}`,
    }[name] || name;
    div.innerHTML = `<div class="chat-tool-head">${label}</div>
      <div class="chat-tool-body">调用中…</div>`;
    messagesEl().appendChild(div);
    messagesEl().scrollTop = messagesEl().scrollHeight;
    return div;
  }

  function markToolDone(toolId, result) {
    const div = document.getElementById(`tool-${toolId}`);
    if (!div) return;
    const isErr = result?.error;
    div.className = `chat-tool ${isErr ? 'error' : 'done'}`;
    let summary = '完成';
    if (isErr) {
      summary = result.error;
    } else if (result?.merchant) {
      summary = `${result.merchant} · ¥${result.amount}`;
    } else if (result?.category) {
      summary = `类别 = ${result.category}`;
    } else if (result?.is_duplicate === true) {
      summary = '⚠️ 发票重复';
    } else if (result?.is_duplicate === false) {
      summary = '未查到重复';
    } else if (result?.ok && result?.field) {
      summary = `${result.field} = ${result.value}`;
    }
    div.querySelector('.chat-tool-body').textContent = summary;
  }

  async function ensureDraft() {
    if (draftId) return draftId;
    const d = await api.createDraft();
    draftId = d.id;
    return draftId;
  }

  async function uploadReceiptToDraft(file) {
    await ensureDraft();
    await api.uploadDraftReceipt(draftId, file);
  }

  function syncFormFromDraft(fields, sources) {
    // 左侧 3 步表单同步
    if (fields.merchant !== undefined) document.getElementById('f-merchant').value = fields.merchant;
    if (fields.amount !== undefined)   document.getElementById('f-amount').value = fields.amount;
    if (fields.date !== undefined)     document.getElementById('f-date').value = fields.date;
    if (fields.tax_amount !== undefined) document.getElementById('f-tax').value = fields.tax_amount;
    if (fields.category !== undefined) document.getElementById('f-category').value = fields.category;
    if (fields.invoice_number !== undefined)
      document.getElementById('f-invoice-number').value = fields.invoice_number;
    if (fields.invoice_code !== undefined)
      document.getElementById('f-invoice-code').value = fields.invoice_code;
    if (fields.description !== undefined) document.getElementById('f-desc').value = fields.description;
    // 跳到第 3 步让用户确认
    if (currentStep < 3) goStep(3);
  }

  async function runChat(userMessage) {
    if (chatStreaming) return;
    chatStreaming = true;
    document.getElementById('chat-send-btn').disabled = true;

    appendMsg('user', userMessage);
    try {
      await ensureDraft();
      await api.chatStream(draftId, userMessage, (event) => {
        if (event.type === 'assistant_text') {
          appendMsg('assistant', event.text);
        } else if (event.type === 'tool_call') {
          appendToolCard(event.id, event.name, event.input);
        } else if (event.type === 'tool_result') {
          markToolDone(event.id, event.result);
        } else if (event.type === 'draft_updated') {
          syncFormFromDraft(event.fields, event.field_sources);
        } else if (event.type === 'error') {
          appendMsg('assistant', '❌ ' + event.message);
        }
      });
    } catch (err) {
      appendMsg('assistant', '❌ 连接失败：' + err.message);
    } finally {
      chatStreaming = false;
      document.getElementById('chat-send-btn').disabled = false;
      document.getElementById('chat-input').value = '';
    }
  }

  window.sendChat = function() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    runChat(text);
  };

})();
</script>
</body>
</html>
