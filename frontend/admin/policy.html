<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="policy.title">政策管理 — ExpenseFlow</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script>
    window.AUTH_MODE = "mock"; window.API_BASE = "";
    if (!localStorage.getItem("mock_role")) { localStorage.setItem("mock_role", "finance_admin"); }
  </script>
</head>
<body>
<div id="nav-root"></div>
<script src="/shared/i18n.js"></script>
  <script src="/shared/auth.js"></script>
<script src="/shared/nav.js"></script>

<main class="page">
  <h1 style="font-size:1.25rem; font-weight:700; margin-bottom:1rem" data-i18n="policy.title">政策管理</h1>
  <div id="alert-box"></div>

  <!-- Category Limits -->
  <div class="card">
    <div class="card-title" data-i18n="policy.limits-title">报销限额</div>
    <div style="font-size:.78rem; color:var(--gray-400); margin-bottom:.75rem" data-i18n="policy.limits-subtitle">
      按费用类别设置单笔限额，以及全局限额规则
    </div>
    <form id="limits-form">
      <div id="limit-rows"></div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:.75rem">
        <button type="button" class="btn btn-outline btn-sm" onclick="addLimitRow()" data-i18n="policy.limit-add">+ 添加类别限额</button>
      </div>

      <div style="margin-top:1.25rem; border-top:1px solid var(--gray-100); padding-top:1rem">
        <div style="font-weight:600; font-size:.85rem; margin-bottom:.75rem" data-i18n="policy.global-rules">全局规则</div>
        <div class="form-grid">
          <div class="form-group">
            <label data-i18n="policy.max-amount">单笔最高金额（CNY）</label>
            <input type="number" id="max_amount_cny" step="0.01" min="0">
          </div>
          <div class="form-group">
            <label data-i18n="policy.receipt-threshold">需上传发票起始金额</label>
            <input type="number" id="require_receipt_above_cny" step="0.01" min="0">
          </div>
          <div class="form-group">
            <label data-i18n="policy.auto-approve">自动批准额度以下</label>
            <input type="number" id="auto_approve_below_cny" step="0.01" min="0">
          </div>
        </div>
      </div>
      <div style="text-align:right; margin-top:.75rem">
        <button type="submit" class="btn btn-primary" data-i18n="policy.save-limits">保存限额</button>
      </div>
    </form>
  </div>

  <!-- GL Account Mapping -->
  <div class="card">
    <div class="card-title" data-i18n="policy.gl-title">会计科目映射</div>
    <div style="font-size:.78rem; color:var(--gray-400); margin-bottom:.75rem" data-i18n="policy.gl-subtitle">
      费用类别 → GL 科目号 — 提交报销时自动落库到 gl_account 字段
    </div>
    <form id="gl-form">
      <div id="gl-rows"></div>
      <div style="display:flex; justify-content:space-between; margin-top:.75rem">
        <button type="button" class="btn btn-outline btn-sm" onclick="addGLRow()" data-i18n="policy.gl-add">+ 添加映射</button>
        <button type="submit" class="btn btn-primary" data-i18n="policy.save-gl">保存映射</button>
      </div>
    </form>
  </div>

  <!-- Projects -->
  <div class="card">
    <div class="card-title" data-i18n="policy.proj-title">项目库</div>
    <div style="font-size:.78rem; color:var(--gray-400); margin-bottom:.75rem" data-i18n="policy.proj-subtitle">
      员工提交时下拉可选；财务复核时也可指派
    </div>
    <form id="proj-form">
      <div id="proj-rows"></div>
      <div style="display:flex; justify-content:space-between; margin-top:.75rem">
        <button type="button" class="btn btn-outline btn-sm" onclick="addProj()" data-i18n="policy.proj-add">+ 添加项目</button>
        <button type="submit" class="btn btn-primary" data-i18n="policy.save-proj">保存项目</button>
      </div>
    </form>
  </div>
</main>

<script src="/shared/api.js"></script>
<script>
(function () {
  let policy = {};

  async function load() {
    try {
      policy = await api.getPolicy();
      renderLimits();
      renderGL();
      renderProj();

      const g = policy;
      if (g.max_amount_cny != null) document.getElementById('max_amount_cny').value = g.max_amount_cny;
      if (g.require_receipt_above_cny != null) document.getElementById('require_receipt_above_cny').value = g.require_receipt_above_cny;
      if (g.auto_approve_below_cny != null) document.getElementById('auto_approve_below_cny').value = g.auto_approve_below_cny;
    } catch (err) {
      showAlert(t('policy.load-fail') + err.message, 'error');
    }
  }

  // ── Category Limits (dynamic rows) ──────────────────────────────

  function renderLimits() {
    const limits = policy.category_limits || {};
    const entries = Object.keys(limits).length
      ? Object.entries(limits)
      : [['', '']];
    document.getElementById('limit-rows').innerHTML = `
      <table>
        <thead><tr>
          <th style="width:45%">${t('policy.limit-col-category')}</th>
          <th>${t('policy.limit-col-amount')}</th>
          <th style="width:32px"></th>
        </tr></thead>
        <tbody id="limit-tbody">
          ${entries.map(([cat, amt]) => limitRowHtml(cat, amt)).join('')}
        </tbody>
      </table>`;
  }

  function limitRowHtml(cat, amt) {
    const catDisplay = cat ? (i18n && i18n.cat ? i18n.cat(cat) : cat) : '';
    return `<tr>
      <td><input type="text" data-limit-cat value="${cat || ''}" placeholder="${t('policy.limit-cat-ph')}"></td>
      <td><input type="number" data-limit-amt value="${amt || ''}" step="0.01" min="0" placeholder="0.00"></td>
      <td><button type="button" class="btn btn-ghost btn-sm" style="color:var(--danger)"
        onclick="this.closest('tr').remove()">✕</button></td>
    </tr>`;
  }

  window.addLimitRow = function() {
    const tbody = document.getElementById('limit-tbody');
    tbody.insertAdjacentHTML('beforeend', limitRowHtml('', ''));
  };

  // ── GL Mapping (dynamic rows) ───────────────────────────────────

  function renderGL() {
    const map = policy.gl_mapping || {};
    const entries = Object.keys(map).length
      ? Object.entries(map)
      : [['', '']];
    document.getElementById('gl-rows').innerHTML = `
      <table>
        <thead><tr>
          <th style="width:45%">${t('policy.gl-col-category')}</th>
          <th>${t('policy.gl-col-account')}</th>
          <th style="width:32px"></th>
        </tr></thead>
        <tbody id="gl-tbody">
          ${entries.map(([cat, acct]) => glRowHtml(cat, acct)).join('')}
        </tbody>
      </table>`;
  }

  function glRowHtml(cat, acct) {
    return `<tr>
      <td><input type="text" data-gl-cat value="${cat || ''}" placeholder="${t('policy.gl-cat-ph')}"></td>
      <td><input type="text" data-gl-acct value="${acct || ''}" placeholder="6602.02"></td>
      <td><button type="button" class="btn btn-ghost btn-sm" style="color:var(--danger)"
        onclick="this.closest('tr').remove()">✕</button></td>
    </tr>`;
  }

  window.addGLRow = function() {
    const tbody = document.getElementById('gl-tbody');
    tbody.insertAdjacentHTML('beforeend', glRowHtml('', ''));
  };

  // ── Projects (dynamic rows, unchanged logic) ───────────────────

  function renderProj() {
    const projects = policy.projects || [];
    const rows = projects.length ? projects : [{code:'', name:''}];
    document.getElementById('proj-rows').innerHTML = `
      <table>
        <thead><tr>
          <th style="width:40%">${t('policy.proj-col-code')}</th>
          <th>${t('policy.proj-col-name')}</th>
          <th style="width:32px"></th>
        </tr></thead>
        <tbody id="proj-tbody">
          ${rows.map((p, i) => projRowHtml(p, i)).join('')}
        </tbody>
      </table>`;
  }

  function projRowHtml(p, i) {
    return `<tr>
      <td><input type="text" data-proj-code value="${p.code || ''}" placeholder="P-2026-A1"></td>
      <td><input type="text" data-proj-name value="${p.name || ''}" placeholder="${t('policy.proj-name-ph')}"></td>
      <td><button type="button" class="btn btn-ghost btn-sm" style="color:var(--danger)"
        onclick="this.closest('tr').remove()">✕</button></td>
    </tr>`;
  }

  window.addProj = function() {
    const tbody = document.getElementById('proj-tbody');
    tbody.insertAdjacentHTML('beforeend', projRowHtml({}, tbody.children.length));
  };

  // ── Save: Limits ────────────────────────────────────────────────

  document.getElementById('limits-form').addEventListener('submit', async e => {
    e.preventDefault();
    const category_limits = {};
    document.getElementById('limit-tbody').querySelectorAll('tr').forEach(tr => {
      const cat = tr.querySelector('[data-limit-cat]').value.trim();
      const amt = tr.querySelector('[data-limit-amt]').value;
      if (cat && amt !== '') category_limits[cat] = parseFloat(amt);
    });
    const data = { category_limits };
    const maxVal = document.getElementById('max_amount_cny').value;
    const receiptVal = document.getElementById('require_receipt_above_cny').value;
    const autoVal = document.getElementById('auto_approve_below_cny').value;
    if (maxVal !== '') data.max_amount_cny = parseFloat(maxVal);
    if (receiptVal !== '') data.require_receipt_above_cny = parseFloat(receiptVal);
    if (autoVal !== '') data.auto_approve_below_cny = parseFloat(autoVal);
    try {
      policy = await api.updatePolicy(data);
      showAlert(t('policy.limits-saved'), 'success');
    } catch (err) { showAlert(t('policy.save-fail') + err.message, 'error'); }
  });

  // ── Save: GL Mapping ────────────────────────────────────────────

  document.getElementById('gl-form').addEventListener('submit', async e => {
    e.preventDefault();
    const gl_mapping = {};
    document.getElementById('gl-tbody').querySelectorAll('tr').forEach(tr => {
      const cat = tr.querySelector('[data-gl-cat]').value.trim();
      const acct = tr.querySelector('[data-gl-acct]').value.trim();
      if (cat) gl_mapping[cat] = acct;
    });
    try {
      policy = await api.updatePolicy({ gl_mapping });
      showAlert(t('policy.gl-saved'), 'success');
    } catch (err) { showAlert(t('policy.save-fail') + err.message, 'error'); }
  });

  // ── Save: Projects ──────────────────────────────────────────────

  document.getElementById('proj-form').addEventListener('submit', async e => {
    e.preventDefault();
    const projects = [];
    document.getElementById('proj-tbody').querySelectorAll('tr').forEach(tr => {
      const code = tr.querySelector('[data-proj-code]').value.trim();
      const name = tr.querySelector('[data-proj-name]').value.trim();
      if (code) projects.push({ code, name });
    });
    try {
      policy = await api.updatePolicy({ projects });
      showAlert(t('policy.proj-saved'), 'success');
    } catch (err) { showAlert(t('policy.save-fail') + err.message, 'error'); }
  });

  function showAlert(msg, type) {
    document.getElementById('alert-box').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => { document.getElementById('alert-box').innerHTML = ''; }, 3000);
  }

  load();
})();
</script>
</body>
</html>
