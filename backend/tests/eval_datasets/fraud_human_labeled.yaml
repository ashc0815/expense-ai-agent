# Fraud LLM Analyzer — human-labeled evaluation dataset
#
# Purpose: Compare fraud_llm_analyzer's 6 subfield outputs against human judgment.
# Unlike the score-range tests in fraud_llm_rules.yaml, this checks that AI's
# buckets (low/medium/high) match human labels.
#
# HOW TO LABEL A CASE:
#   1. Describe a real or realistic submission in `input`
#   2. Fill `human_label` — what YOU think the right answer is
#      - template_score_bucket:   low  (unique) | medium (some echo) | high (very template-y)
#      - contradiction_found:     true | false  (does receipt location contradict description?)
#      - extracted_person_count:  integer (people mentioned in description) or null
#      - person_amount_reasonable: true | false (is amount/people_count normal for category?)
#      - vagueness_bucket:        low (specific) | medium (generic words mixed in) | high ("其他"/"费用")
#      - overall_risk:            clean | suspicious | fraud
#   3. Write labeler_note — WHY you labeled it that way (future-you will thank you)
#
# Target: 30 cases total covering 5 clean + 5 template + 5 contradiction +
#         5 per-person-weird + 5 vague + 5 compound.

- id: fh_placeholder_001
  description: "PLACEHOLDER — clean team dinner, replace with real case"
  input:
    description: "团队午餐 海底捞 5人 讨论 Q2 项目进度"
    amount: 480.0
    currency: CNY
    category: meal
    merchant: 海底捞
    city: 上海
    date: 2026-04-10
    recent_descriptions: []
  human_label:
    template_score_bucket: low
    contradiction_found: false
    extracted_person_count: 5
    person_amount_reasonable: true
    vagueness_bucket: low
    overall_risk: clean
  labeler_note: "人均 96 元正常；描述具体（提到人数 + 目的）；无矛盾信息。"

- id: fh_placeholder_002
  description: "PLACEHOLDER — repeated-template submission"
  input:
    description: "团队午餐 海底捞 5人"
    amount: 480.0
    currency: CNY
    category: meal
    merchant: 海底捞
    city: 上海
    date: 2026-04-18
    recent_descriptions:
      - "团队午餐 海底捞 5人"
      - "团队午餐 海底捞 5人"
      - "团队午餐 海底捞 5人"
  human_label:
    template_score_bucket: high
    contradiction_found: false
    extracted_person_count: 5
    person_amount_reasonable: true
    vagueness_bucket: low
    overall_risk: suspicious
  labeler_note: "同一段描述出现 3+ 次，明显是复制粘贴；单笔看着正常但模式可疑。"

- id: fh_placeholder_003
  description: "PLACEHOLDER — per-person amount unreasonable"
  input:
    description: "两人晚餐"
    amount: 4800.0
    currency: CNY
    category: meal
    merchant: 米其林三星餐厅
    city: 上海
    date: 2026-04-15
    recent_descriptions: []
  human_label:
    template_score_bucket: low
    contradiction_found: false
    extracted_person_count: 2
    person_amount_reasonable: false
    vagueness_bucket: medium
    overall_risk: fraud
  labeler_note: "两人吃饭 4800 元（人均 2400）远超任何合理报销政策；描述也模糊（没说见谁、谈什么）。"
