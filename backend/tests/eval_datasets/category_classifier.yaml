# Eval cases for Category Classifier (keyword-based)
# Pure function: tool_suggest_category({merchant}) → {category, confidence, reason}
# Graded by: code (category match + confidence match)

# ═══════════════════════════════════════════════════════════════
# Meal — 餐饮关键词
# ═══════════════════════════════════════════════════════════════

- id: classify_meal_haidilao
  component: category_classifier
  description: "海底捞 → meal"
  input:
    merchant: "海底捞火锅(浦东店)"
  expect:
    category: "meal"
    confidence: 0.92

- id: classify_meal_coffee
  component: category_classifier
  description: "咖啡 → meal"
  input:
    merchant: "星巴克咖啡"
  expect:
    category: "meal"
    confidence: 0.92

- id: classify_meal_restaurant_en
  component: category_classifier
  description: "英文restaurant → meal"
  input:
    merchant: "Joe's Restaurant & Bar"
  expect:
    category: "meal"
    confidence: 0.92

- id: classify_meal_rice
  component: category_classifier
  description: "含'饭'字 → meal"
  input:
    merchant: "沙县小吃盖浇饭"
  expect:
    category: "meal"
    confidence: 0.92

- id: classify_meal_coffee_en
  component: category_classifier
  description: "英文coffee → meal (大小写不敏感)"
  input:
    merchant: "Blue Bottle Coffee"
  expect:
    category: "meal"
    confidence: 0.92

