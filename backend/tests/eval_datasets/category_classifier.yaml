- id: classify_priority_meal_over_entertainment
  component: category_classifier
  description: "含'餐'和'会所'时优先匹配meal(规则顺序靠前)"
  input:
    merchant: "会所餐厅"
  expect:
    category: "meal"
    confidence: 0.92

- id: classify_substring_cha
  component: category_classifier
  description: "'茶'作为子串匹配meal"
  input:
    merchant: "功夫茶馆"
  expect:
    category: "meal"
    confidence: 0.92
