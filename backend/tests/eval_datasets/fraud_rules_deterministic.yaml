# Eval cases for deterministic fraud rules (rules 1-10, 15-20)
# Each case calls one rule function and checks whether it fires or not.
# Graded by: code (signal_count, rule_name match)

# ═══════════════════════════════════════════════════════════════
# Rule 1: duplicate_attendee — 同餐重复报销
# ═══════════════════════════════════════════════════════════════

- id: rule1_positive_overlap
  component: fraud_rules_deterministic
  rule: duplicate_attendee
  description: "A和B同日同商户报餐，B的attendee含A → 应触发"
  input:
    submissions:
      - id: "s1"
        employee_id: "emp-A"
        amount: 200
        currency: "CNY"
        category: "meal"
        date: "2026-04-10"
        merchant: "海底捞"
        attendees: ["emp-B"]
      - id: "s2"
        employee_id: "emp-B"
        amount: 180
        currency: "CNY"
        category: "meal"
        date: "2026-04-10"
        merchant: "海底捞"
        attendees: ["emp-A"]
  expect:
    has_signal: true
    rule_name: "duplicate_attendee"

- id: rule1_negative_different_date
  component: fraud_rules_deterministic
  rule: duplicate_attendee
  description: "同商户不同日期 → 不应触发"
  input:
    submissions:
      - id: "s1"
        employee_id: "emp-A"
        amount: 200
        currency: "CNY"
        category: "meal"
        date: "2026-04-10"
        merchant: "海底捞"
        attendees: ["emp-B"]
      - id: "s2"
        employee_id: "emp-B"
        amount: 180
        currency: "CNY"
        category: "meal"
        date: "2026-04-11"
        merchant: "海底捞"
        attendees: ["emp-A"]
  expect:
    has_signal: false

- id: rule1_negative_no_attendee_overlap
  component: fraud_rules_deterministic
  rule: duplicate_attendee
  description: "同日同商户，但attendee无交叉 → 不应触发"
  input:
    submissions:
      - id: "s1"
        employee_id: "emp-A"
        amount: 200
        currency: "CNY"
        category: "meal"
        date: "2026-04-10"
        merchant: "海底捞"
        attendees: ["emp-C"]
      - id: "s2"
        employee_id: "emp-B"
        amount: 180
        currency: "CNY"
        category: "meal"
        date: "2026-04-10"
        merchant: "海底捞"
        attendees: ["emp-D"]
  expect:
    has_signal: false

