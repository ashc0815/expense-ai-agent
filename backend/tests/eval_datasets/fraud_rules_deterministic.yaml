      id: "emp-A"
      department: "Engineering"
      resignation_date: "2026-04-15"
  expect:
    has_signal: true
    rule_name: "pre_resignation_rush"

- id: rule9_negative_no_resignation
  component: fraud_rules_deterministic
  rule: pre_resignation_rush
  description: "未离职员工 → 不应触发"
  input:
    submissions:
      - {id: "s1", employee_id: "emp-A", amount: 5000, currency: "CNY", category: "meal", date: "2026-04-01", merchant: "餐厅"}
    employee:
      id: "emp-A"
      department: "Engineering"
  expect:
    has_signal: false

# ═══════════════════════════════════════════════════════════════
# Rule 10: fx_arbitrage — 汇率套利
# ═══════════════════════════════════════════════════════════════

- id: rule10_positive_high_rate
  component: fraud_rules_deterministic
  rule: fx_arbitrage
  description: "申报汇率高于市场价5%(超过2%阈值) → 应触发"
  input:
    submissions:
      - {id: "s1", employee_id: "emp-A", amount: 1000, currency: "USD", category: "meal", date: "2026-04-10", merchant: "restaurant", exchange_rate: 7.56}
    market_rates:
      USD_CNY: 7.2
  expect:
    has_signal: true
    rule_name: "fx_arbitrage"

- id: rule10_negative_within_range
  component: fraud_rules_deterministic
  rule: fx_arbitrage
  description: "申报汇率偏差1%(在2%阈值内) → 不应触发"
  input:
    submissions:
      - {id: "s1", employee_id: "emp-A", amount: 1000, currency: "USD", category: "meal", date: "2026-04-10", merchant: "restaurant", exchange_rate: 7.27}
    market_rates:
      USD_CNY: 7.2
  expect:
    has_signal: false

- id: rule10_negative_cny
  component: fraud_rules_deterministic
  rule: fx_arbitrage
  description: "CNY本币不检查汇率 → 不应触发"
  input:
    submissions:
      - {id: "s1", employee_id: "emp-A", amount: 1000, currency: "CNY", category: "meal", date: "2026-04-10", merchant: "餐厅", exchange_rate: 99.0}
    market_rates:
      USD_CNY: 7.2
  expect:
    has_signal: false

# ═══════════════════════════════════════════════════════════════
# Rule 15: collusion_pattern — 串通拆单
# ═══════════════════════════════════════════════════════════════

- id: rule15_positive_alternating
  component: fraud_rules_deterministic
  rule: collusion_pattern
  description: "两人交替在同商户同类别报销3笔 → 应触发"
  input:
