        city: "北京"
      - id: "s3"
        employee_id: "emp-A"
        amount: 150
        currency: "CNY"
        category: "meal"
        date: "2026-04-10"
        merchant: "餐厅B"
        city: "北京"
  expect:
    has_signal: false

# ═══════════════════════════════════════════════════════════════
# Rule 3: threshold_proximity — 卡线报销
# ═══════════════════════════════════════════════════════════════

- id: rule3_positive_near_limit
  component: fraud_rules_deterministic
  rule: threshold_proximity
  description: "3笔金额在291-300区间(3%内) → 应触发"
  input:
    submissions:
      - {id: "s1", employee_id: "emp-A", amount: 299, currency: "CNY", category: "meal", date: "2026-04-01", merchant: "餐厅"}
      - {id: "s2", employee_id: "emp-A", amount: 295, currency: "CNY", category: "meal", date: "2026-04-02", merchant: "餐厅"}
      - {id: "s3", employee_id: "emp-A", amount: 298, currency: "CNY", category: "meal", date: "2026-04-03", merchant: "餐厅"}
  expect:
    has_signal: true
    rule_name: "threshold_proximity"

- id: rule3_negative_below_range
  component: fraud_rules_deterministic
  rule: threshold_proximity
  description: "3笔金额在290以下(超出3%范围) → 不应触发"
  input:
    submissions:
      - {id: "s1", employee_id: "emp-A", amount: 280, currency: "CNY", category: "meal", date: "2026-04-01", merchant: "餐厅"}
      - {id: "s2", employee_id: "emp-A", amount: 270, currency: "CNY", category: "meal", date: "2026-04-02", merchant: "餐厅"}
      - {id: "s3", employee_id: "emp-A", amount: 260, currency: "CNY", category: "meal", date: "2026-04-03", merchant: "餐厅"}
  expect:
    has_signal: false

- id: rule3_negative_only_two
  component: fraud_rules_deterministic
  rule: threshold_proximity
  description: "仅2笔近限额(不满min_count=3) → 不应触发"
  input:
    submissions:
      - {id: "s1", employee_id: "emp-A", amount: 299, currency: "CNY", category: "meal", date: "2026-04-01", merchant: "餐厅"}
      - {id: "s2", employee_id: "emp-A", amount: 298, currency: "CNY", category: "meal", date: "2026-04-02", merchant: "餐厅"}
  expect:
    has_signal: false

