  rule: round_amount
  description: "6笔中5笔整数(83%>50%且round_count≥5) → 应触发"
  input:
    submissions:
      - {id: "s1", employee_id: "emp-A", amount: 200, currency: "CNY", category: "meal", date: "2026-04-01", merchant: "餐厅"}
