# ═══════════════════════════════════════════════════════════════
# Rule 9: pre_resignation_rush — 离职前突击报销
# ═══════════════════════════════════════════════════════════════

- id: rule9_positive_rush
  component: fraud_rules_deterministic
  rule: pre_resignation_rush
  description: "离职前30天报销金额远超月均 → 应触发"
  input:
    submissions:
      # 正常期间: 3个月每月约1000
      - {id: "s1", employee_id: "emp-A", amount: 500, currency: "CNY", category: "meal", date: "2026-01-10", merchant: "餐厅"}
      - {id: "s2", employee_id: "emp-A", amount: 500, currency: "CNY", category: "meal", date: "2026-01-20", merchant: "餐厅"}
      - {id: "s3", employee_id: "emp-A", amount: 500, currency: "CNY", category: "meal", date: "2026-02-10", merchant: "餐厅"}
      - {id: "s4", employee_id: "emp-A", amount: 500, currency: "CNY", category: "meal", date: "2026-02-20", merchant: "餐厅"}
      - {id: "s5", employee_id: "emp-A", amount: 500, currency: "CNY", category: "meal", date: "2026-03-01", merchant: "餐厅"}
      - {id: "s6", employee_id: "emp-A", amount: 500, currency: "CNY", category: "meal", date: "2026-03-10", merchant: "餐厅"}
      # 离职前30天突击: 5000+
      - {id: "s7", employee_id: "emp-A", amount: 2000, currency: "CNY", category: "meal", date: "2026-04-01", merchant: "餐厅"}
      - {id: "s8", employee_id: "emp-A", amount: 2000, currency: "CNY", category: "meal", date: "2026-04-05", merchant: "餐厅"}
      - {id: "s9", employee_id: "emp-A", amount: 1500, currency: "CNY", category: "meal", date: "2026-04-10", merchant: "餐厅"}
