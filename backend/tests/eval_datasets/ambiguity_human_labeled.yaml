# Ambiguity Detector — human-labeled evaluation dataset
#
# Purpose: 3-class confusion matrix for the detector's recommendation.
#   auto_pass       → let it through
#   human_review    → escalate to manager
#   suggest_reject  → outright reject
#
# HOW TO LABEL A CASE:
#   1. Fill `input` with a real or realistic submission
#   2. Fill `human_gold` with what the RIGHT decision is from a domain-expert's eyes
#      (imagine you're the finance manager — what should the system do?)
#   3. Write labeler_note with the reasoning
#
# CRITICAL CELLS TO WATCH (in the Dashboard confusion matrix):
#   - gold=suggest_reject & ai=auto_pass  → false negative (risk slipped through)
#   - gold=auto_pass      & ai=suggest_reject → false positive (legit user blocked)
#
# Target: 40 cases, ~13 per class.

- id: ah_placeholder_001
  description: "PLACEHOLDER — clear, well-documented meal"
  input:
    expense_type: meals
    amount: 120.0
    city: 上海
    date: 2026-04-14       # Monday
    description: 与产品经理张三、李四讨论Q2路线图，工作午餐
    attendees: [张三, 李四]
    employee_level: L3
    history: []
    fraud_signals: []
  human_gold: auto_pass
  labeler_note: "金额正常、工作日、描述具体、有明确参会人 — 教科书级清洁报销。"

- id: ah_placeholder_002
  description: "PLACEHOLDER — vague description, boundary amount"
  input:
    expense_type: meals
    amount: 380.0
    city: 上海
    date: 2026-04-18       # Saturday
    description: 费用
    attendees: []
    employee_level: L3
    history: []
    fraud_signals: []
  human_gold: human_review
  labeler_note: "周末 + 描述仅'费用'两个字 + 没写参会人；单看任意一项都说得过去，叠加就需要人过一眼。"

- id: ah_placeholder_003
  description: "PLACEHOLDER — pattern + vague + high amount"
  input:
    expense_type: meals
    amount: 1200.0
    city: 上海
    date: 2026-04-20
    description: 招待
    attendees: []
    employee_level: L2
    history:
      - {amount: 1200.0, date: 2026-04-18, description: 招待}
      - {amount: 1180.0, date: 2026-04-15, description: 招待}
      - {amount: 1200.0, date: 2026-04-12, description: 招待}
    fraud_signals: [pattern_anomaly, description_vague]
  human_gold: suggest_reject
  labeler_note: "L2 员工短期内 4 次相近金额的'招待'，描述极度模糊，无参会人 — 多重红旗叠加，不应自动过也不值得浪费 manager 时间细审。"
