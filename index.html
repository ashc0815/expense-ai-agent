<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConcurShield — 费用报销智能审核</title>
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,system-ui,sans-serif;background:#0f1117;color:#e1e4e8;line-height:1.6;min-height:100vh}
code{font-family:'Consolas',monospace;font-size:12px;color:#a5d6ff;background:#0d1117;padding:1px 6px;border-radius:3px}
button{font-family:inherit;cursor:pointer;border:none;outline:none}

/* ── Header ── */
header{background:linear-gradient(135deg,#1a1c2e 0%,#0d1b2a 100%);padding:18px 0;border-bottom:1px solid #21262d;position:sticky;top:0;z-index:100}
header .inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;font-weight:700;letter-spacing:.5px}
header h1 span{color:#58a6ff}
header .nav{display:flex;gap:12px}
header .nav a{color:#8b949e;text-decoration:none;padding:6px 14px;border-radius:6px;font-size:13px;transition:all .15s}
header .nav a:hover{background:#21262d;color:#e1e4e8}

/* ── Layout ── */
.container{max-width:1400px;margin:0 auto;padding:24px;display:grid;grid-template-columns:320px 1fr;gap:20px}
@media(max-width:968px){.container{grid-template-columns:1fr}}

/* ── Sidebar (preset picker) ── */
.sidebar{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:18px;height:fit-content;position:sticky;top:90px}
.sidebar h2{font-size:13px;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #21262d}
.preset-list{display:flex;flex-direction:column;gap:8px}
.preset-item{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;position:relative}
.preset-item:hover{border-color:#388bfd;background:#161b22}
.preset-item.active{border-color:#58a6ff;background:#0c1d38;box-shadow:0 0 0 1px #58a6ff inset}
.preset-item.showcase::before{content:'★';position:absolute;right:8px;top:6px;color:#d29922;font-size:13px}
.preset-item .title{font-size:13px;font-weight:600;color:#f0f6fc;margin-bottom:3px;padding-right:14px}
.preset-item .subtitle{font-size:11px;color:#8b949e;line-height:1.45}
.preset-item .expected{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-top:6px;font-weight:600}
.expected.completed{background:#1b4332;color:#3fb950}
.expected.rejected{background:#3d1114;color:#f85149}
.expected.pending_review{background:#3b2e08;color:#d29922}
.expected.detected{background:#1c2541;color:#58a6ff}

.sidebar .run-btn{width:100%;margin-top:16px;padding:10px;background:#238636;color:#fff;border-radius:6px;font-size:13px;font-weight:600;transition:background .15s}
.sidebar .run-btn:hover{background:#2ea043}
.sidebar .run-btn:disabled{background:#484f58;cursor:not-allowed}
.sidebar .run-all-btn{width:100%;margin-top:8px;padding:8px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;font-size:12px;transition:all .15s}
.sidebar .run-all-btn:hover{background:#30363d}

/* ── Main Area ── */
.main{min-width:0}
.welcome{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:40px;text-align:center;color:#8b949e}
.welcome h3{font-size:18px;color:#c9d1d9;margin-bottom:8px}
.welcome p{font-size:13px}

/* ── Report Info Card ── */
.report-card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:20px;margin-bottom:16px}
.report-card .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.report-card h3{font-size:15px;color:#f0f6fc}
.report-card .report-id{font-size:11px;color:#8b949e;font-family:'Consolas',monospace}
.report-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;padding:12px 0;border-top:1px solid #21262d;border-bottom:1px solid #21262d;margin:10px 0}
.report-meta div{font-size:12px}
.report-meta .label{color:#8b949e;margin-bottom:2px}
.report-meta .value{color:#f0f6fc;font-weight:600;font-size:14px}
.line-items{margin-top:12px}
.line-item{display:flex;justify-content:space-between;padding:8px 10px;background:#0d1117;border-radius:6px;margin-top:6px;font-size:12px}
.line-item .main-info{color:#c9d1d9}
.line-item .main-info strong{color:#a5d6ff}
.line-item .amount{color:#3fb950;font-weight:600}

/* ── Pipeline ── */
.pipeline{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:20px;margin-bottom:16px}
.pipeline-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.pipeline-header h3{font-size:15px;color:#f0f6fc}
.final-status{font-size:12px;font-weight:700;padding:4px 12px;border-radius:6px}
.final-status.completed{background:#1b4332;color:#3fb950}
.final-status.rejected{background:#3d1114;color:#f85149}
.final-status.pending_review{background:#3b2e08;color:#d29922}
.final-status.detected{background:#1c2541;color:#58a6ff}
.final-status.payment_failed{background:#3d1114;color:#f85149}

.pipeline-steps{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;position:relative}
.pipeline-step{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px;text-align:center;position:relative;animation:fadeIn .3s ease-out both}
.pipeline-step:nth-child(1){animation-delay:.05s}
.pipeline-step:nth-child(2){animation-delay:.15s}
.pipeline-step:nth-child(3){animation-delay:.25s}
.pipeline-step:nth-child(4){animation-delay:.35s}
.pipeline-step:nth-child(5){animation-delay:.45s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pipeline-step.passed{border-color:#238636}
.pipeline-step.failed{border-color:#da3633}
.pipeline-step.skipped{border-color:#484f58;opacity:.5}
.pipeline-step .icon{font-size:24px;margin-bottom:6px}
.pipeline-step.passed .icon{color:#3fb950}
.pipeline-step.failed .icon{color:#f85149}
.pipeline-step.skipped .icon{color:#8b949e}
.pipeline-step .name{font-size:13px;font-weight:600;color:#c9d1d9}
.pipeline-step .duration{font-size:10px;color:#8b949e;margin-top:4px}
.pipeline-step .message{font-size:10px;color:#8b949e;margin-top:4px;line-height:1.35}
@media(max-width:768px){.pipeline-steps{grid-template-columns:repeat(2,1fr)}}

.pipeline-total{display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid #21262d;font-size:12px;color:#8b949e}

/* ── Step Detail ── */
.step-detail{background:#0d1117;border-top:1px solid #21262d;border-radius:0 0 8px 8px;padding:14px;margin-top:-1px;display:none;font-size:12px}
.step-detail.open{display:block}
.step-detail pre{color:#a5d6ff;white-space:pre-wrap;word-break:break-all}
.step-detail .k{color:#d2a8ff}
.step-detail .v{color:#a5d6ff}

/* ── Shield Report ── */
.shield-report{background:linear-gradient(135deg,#3b2e08 0%,#1a1c2e 100%);border:1px solid #d29922;border-radius:10px;padding:20px;margin-bottom:16px}
.shield-report h3{font-size:15px;color:#d29922;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.shield-report h3::before{content:'🛡️';font-size:18px}
.shield-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:14px}
.shield-metric{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:10px;text-align:center}
.shield-metric .label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.shield-metric .value{font-size:20px;font-weight:700;color:#d29922;margin-top:4px}
.shield-metric .value.red{color:#f85149}
.shield-factors{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.shield-factors span{font-size:11px;background:#3b2e08;color:#d29922;padding:3px 10px;border-radius:12px;border:1px solid #9e6a03}
.shield-explanation{font-size:12px;color:#c9d1d9;background:#0d1117;padding:10px;border-radius:6px;line-height:1.5}

.llm-review{margin-top:14px;padding:14px;background:#0d1117;border-radius:6px;border-left:3px solid #58a6ff}
.llm-review .llm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.llm-review .llm-header strong{font-size:13px;color:#58a6ff}
.llm-review .source-badge{font-size:10px;padding:2px 8px;border-radius:4px;background:#1c2541;color:#58a6ff;text-transform:uppercase}
.llm-review .source-badge.claude{background:#2d1b5c;color:#d2a8ff}
.llm-review .source-badge.minimax{background:#0d3d6f;color:#79c0ff}
.llm-review .risk-row{display:flex;gap:10px;margin-bottom:10px;font-size:12px}
.llm-review .risk-level{font-weight:700;padding:2px 10px;border-radius:4px}
.risk-level.高,.risk-level.high{background:#3d1114;color:#f85149}
.risk-level.中,.risk-level.medium{background:#3b2e08;color:#d29922}
.risk-level.低,.risk-level.low{background:#1b4332;color:#3fb950}
.llm-review ul{margin:6px 0 10px 18px;font-size:12px;color:#c9d1d9}
.llm-review ul li{margin-bottom:3px}
.llm-review .reasoning{font-size:12px;color:#8b949e;font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid #21262d}

/* ── With History (Case 5) ── */
.with-history{margin-top:14px;padding:14px;background:#0d1117;border:1px dashed #f85149;border-radius:6px}
.with-history h4{font-size:12px;color:#f85149;margin-bottom:8px;text-transform:uppercase}
.with-history .compare{display:flex;gap:14px;align-items:center;font-size:12px;color:#c9d1d9}
.with-history .arrow{font-size:18px;color:#f85149}
.with-history .score-before,.with-history .score-after{flex:1;text-align:center}
.with-history .score-after{color:#f85149;font-weight:700}

/* ── Log Panel ── */
.log-panel{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:18px}
.log-panel h3{font-size:13px;color:#8b949e;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.log-entries{max-height:280px;overflow-y:auto;background:#0d1117;border-radius:6px;padding:12px;font-family:'Consolas',monospace;font-size:11px}
.log-entry{padding:2px 0;color:#8b949e;white-space:pre-wrap}
.log-entry .ts{color:#484f58}
.log-entry .src{color:#58a6ff;font-weight:600}
.log-entry .msg{color:#c9d1d9}

/* ── Loader ── */
.loading{display:none;text-align:center;padding:40px;color:#8b949e;font-size:13px}
.loading.active{display:block}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{background:#3d1114;border:1px solid #f85149;color:#f85149;padding:14px;border-radius:8px;margin-bottom:16px;font-size:13px}
</style>
</head>
<body>

<header>
  <div class="inner">
    <h1>ConcurShield — <span>Agent Only for Ambiguity</span></h1>
    <div class="nav">
      <a href="/">入口</a>
      <a href="/dashboard.html" target="_blank">静态 Dashboard</a>
    </div>
  </div>
</header>

<div class="container">

  <!-- ═════════ Sidebar ═════════ -->
  <aside class="sidebar">
    <h2>📋 选择测试场景</h2>
    <div class="preset-list" id="presetList">
      <div style="color:#8b949e;font-size:12px">加载中...</div>
    </div>
    <button class="run-btn" id="runBtn" disabled>▶ 运行审核</button>
    <button class="run-all-btn" id="runAllBtn">⚡ 批量跑全部 7 个场景</button>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid #21262d;font-size:11px;color:#484f58;line-height:1.6">
      <strong style="color:#8b949e">★ Showcase 场景</strong><br>
      Case 5 / 6 / 7 展示 ConcurShield 的核心差异化能力
    </div>
  </aside>

  <!-- ═════════ Main ═════════ -->
  <main class="main">
    <div class="welcome" id="welcome">
      <h3>👈 从左侧选择一个测试场景开始</h3>
      <p>ConcurShield 会通过 5 个 Skill 对报销单执行完整审核流程</p>
      <p style="margin-top:14px;font-size:12px">配置驱动 · 城市标准化 · 五维模糊检测 · LLM 深度分析</p>
    </div>

    <div class="loading" id="loading">
      <span class="spinner"></span>处理中...
    </div>

    <div id="results" style="display:none"></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 数据加载
// ═══════════════════════════════════════════════════════════════

let selectedPreset = null;

async function loadPresets() {
  const list = document.getElementById('presetList');
  try {
    const res = await fetch('/api/presets');
    const presets = await res.json();
    list.innerHTML = '';
    presets.forEach(p => {
      const el = document.createElement('div');
      el.className = 'preset-item' + (p.showcase ? ' showcase' : '');
      el.dataset.id = p.id;
      el.innerHTML = `
        <div class="title">${p.title}</div>
        <div class="subtitle">${p.subtitle}</div>
        <div class="expected ${p.expected}">${p.expected.toUpperCase()}</div>
      `;
      el.addEventListener('click', () => selectPreset(p.id));
      list.appendChild(el);
    });
  } catch (e) {
    list.innerHTML = `<div class="error-box">加载预设失败: ${e.message}</div>`;
  }
}

function selectPreset(id) {
  selectedPreset = id;
  document.querySelectorAll('.preset-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  document.getElementById('runBtn').disabled = false;
}

async function runPreset() {
  if (!selectedPreset) return;
  const runBtn = document.getElementById('runBtn');
  runBtn.disabled = true;
  runBtn.textContent = '⏳ 处理中...';

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('loading').classList.add('active');

  try {
    const res = await fetch('/api/process', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({preset: selectedPreset}),
    });
    const data = await res.json();
    renderResult(data);
  } catch (e) {
    document.getElementById('results').innerHTML = `<div class="error-box">处理失败: ${e.message}</div>`;
    document.getElementById('results').style.display = 'block';
  } finally {
    document.getElementById('loading').classList.remove('active');
    runBtn.disabled = false;
    runBtn.textContent = '▶ 运行审核';
  }
}

// ═══════════════════════════════════════════════════════════════
// 渲染结果
// ═══════════════════════════════════════════════════════════════

function renderResult(data) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  container.style.display = 'block';

  // Case 6 特殊渲染（规则 A 但模式异常）
  if (data.is_case6) {
    renderCase6(data, container);
    return;
  }

  // ---- 报销单信息 ----
  container.appendChild(renderReportCard(data.report));

  // ---- Pipeline ----
  container.appendChild(renderPipeline(data));

  // ---- Shield 报告 ----
  if (data.shield_report && data.shield_report.flagged_items?.length > 0) {
    container.appendChild(renderShieldReport(data));
  }

  // ---- Case 5 With History ----
  if (data.case5_with_history) {
    container.appendChild(renderCase5History(data.case5_with_history, data.shield_report));
  }

  // ---- 处理日志 ----
  container.appendChild(renderLogPanel(data.processing_log));
}

function renderReportCard(report) {
  const div = document.createElement('div');
  div.className = 'report-card';
  const itemsHtml = report.line_items.map(item => `
    <div class="line-item">
      <div class="main-info">
        <strong>${item.expense_type}</strong> · ${item.city} · ${item.date}
        <br><span style="color:#8b949e;font-size:11px">${item.description}</span>
      </div>
      <div class="amount">¥${item.amount.toFixed(2)}</div>
    </div>
  `).join('');

  div.innerHTML = `
    <div class="row">
      <h3>📄 报销单详情</h3>
      <span class="report-id">${report.report_id}</span>
    </div>
    <div class="report-meta">
      <div><div class="label">员工</div><div class="value">${report.employee.name}</div></div>
      <div><div class="label">等级</div><div class="value">${report.employee.level}</div></div>
      <div><div class="label">部门</div><div class="value">${report.employee.department}</div></div>
      <div><div class="label">总金额</div><div class="value" style="color:#3fb950">¥${report.total_amount.toFixed(2)}</div></div>
    </div>
    <div class="line-items">${itemsHtml}</div>
  `;
  return div;
}

function renderPipeline(data) {
  const div = document.createElement('div');
  div.className = 'pipeline';

  const iconFor = (step) => {
    if (step.skipped) return '⊘';
    return step.passed ? '✓' : '✗';
  };
  const classFor = (step) => {
    if (step.skipped) return 'skipped';
    return step.passed ? 'passed' : 'failed';
  };

  const stepsHtml = data.timeline.map(step => `
    <div class="pipeline-step ${classFor(step)}">
      <div class="icon">${iconFor(step)}</div>
      <div class="name">${step.display_name}</div>
      <div class="duration">${step.duration_ms.toFixed(1)}ms</div>
    </div>
  `).join('');

  // 对于少于 5 步的情况（比如 Case 2 发票验证失败），填充空位
  const emptyCount = Math.max(0, 5 - data.timeline.length);
  const emptyHtml = Array(emptyCount).fill(0).map(() => `
    <div class="pipeline-step" style="opacity:.25">
      <div class="icon">—</div>
      <div class="name" style="color:#484f58">未执行</div>
      <div class="duration">—</div>
    </div>
  `).join('');

  div.innerHTML = `
    <div class="pipeline-header">
      <h3>⚙️ 处理流水线</h3>
      <span class="final-status ${data.final_status}">${data.final_status.toUpperCase()}</span>
    </div>
    <div class="pipeline-steps">${stepsHtml}${emptyHtml}</div>
    <div class="pipeline-total">
      <span>总耗时: <strong style="color:#58a6ff">${data.total_ms.toFixed(2)}ms</strong></span>
      <span>执行步骤: ${data.timeline.filter(s=>!s.skipped).length}/${data.timeline.length}</span>
    </div>
  `;
  return div;
}

function renderShieldReport(data) {
  const div = document.createElement('div');
  div.className = 'shield-report';
  const item = data.shield_report.flagged_items[0];

  const scoreColor = item.ambiguity_score > 70 ? 'red' : '';
  const factorsHtml = item.triggered_factors.map(f =>
    `<span>${f.replace(/_/g, ' ')}</span>`
  ).join('');

  let llmHtml = '';
  if (item.llm_review) {
    const llm = item.llm_review;
    const riskPoints = (llm.risk_points || []).map(p => `<li>${p}</li>`).join('');
    const materials = (llm.required_materials || []).map(m => `<li>${m}</li>`).join('');
    llmHtml = `
      <div class="llm-review">
        <div class="llm-header">
          <strong>🤖 LLM 深度合规审计</strong>
          <span class="source-badge ${llm.source}">${llm.source}</span>
        </div>
        <div class="risk-row">
          <span>风险等级:</span>
          <span class="risk-level ${llm.risk_level}">${llm.risk_level}</span>
          <span style="margin-left:auto">建议: <strong>${llm.recommendation}</strong></span>
        </div>
        ${riskPoints ? `<div style="font-size:12px;color:#8b949e;margin-top:6px">风险点:</div><ul>${riskPoints}</ul>` : ''}
        ${materials ? `<div style="font-size:12px;color:#8b949e">需补充材料:</div><ul>${materials}</ul>` : ''}
        ${llm.reasoning ? `<div class="reasoning">${llm.reasoning}</div>` : ''}
      </div>
    `;
  }

  div.innerHTML = `
    <h3>Shield 触发 — 模糊检测报告</h3>
    <div class="shield-metrics">
      <div class="shield-metric">
        <div class="label">Ambiguity Score</div>
        <div class="value ${scoreColor}">${item.ambiguity_score.toFixed(1)}</div>
      </div>
      <div class="shield-metric">
        <div class="label">建议</div>
        <div class="value" style="font-size:14px">${item.recommendation}</div>
      </div>
      <div class="shield-metric">
        <div class="label">触发因素</div>
        <div class="value">${item.triggered_factors.length}/5</div>
      </div>
      <div class="shield-metric">
        <div class="label">费用类型</div>
        <div class="value" style="font-size:14px">${item.expense_type}</div>
      </div>
    </div>
    <div class="shield-factors">${factorsHtml}</div>
    <div class="shield-explanation">${item.explanation}</div>
    ${llmHtml}
  `;
  return div;
}

function renderCase5History(hist, shieldReport) {
  const div = document.createElement('div');
  div.className = 'with-history';
  const originalScore = shieldReport?.flagged_items?.[0]?.ambiguity_score || 0;

  const newFactors = hist.triggered_factors.filter(f => f === 'pattern_anomaly');

  div.innerHTML = `
    <h4>📈 注入历史数据后（5天内3笔相似金额）</h4>
    <div class="compare">
      <div class="score-before">
        <div style="font-size:10px;color:#8b949e">原始 score</div>
        <div style="font-size:20px;font-weight:700">${originalScore.toFixed(1)}</div>
      </div>
      <div class="arrow">→</div>
      <div class="score-after">
        <div style="font-size:10px;color:#8b949e">+ pattern_anomaly</div>
        <div style="font-size:20px;font-weight:700">${hist.score.toFixed(1)}</div>
      </div>
    </div>
    <div style="font-size:12px;color:#c9d1d9;margin-top:10px;padding:10px;background:#0d1117;border-radius:4px">
      新建议: <strong style="color:#f85149">${hist.recommendation}</strong><br>
      <span style="color:#8b949e">${hist.explanation}</span>
    </div>
  `;
  return div;
}

function renderCase6(data, container) {
  container.appendChild(renderReportCard(data.report));

  const div = document.createElement('div');
  div.className = 'shield-report';
  const amb = data.ambiguity;

  let llmHtml = '';
  if (amb.llm_review) {
    const llm = amb.llm_review;
    const riskPoints = (llm.risk_points || []).map(p => `<li>${p}</li>`).join('');
    llmHtml = `
      <div class="llm-review">
        <div class="llm-header">
          <strong>🤖 LLM 深度合规审计</strong>
          <span class="source-badge ${llm.source}">${llm.source}</span>
        </div>
        <div class="risk-row">
          <span>风险等级:</span>
          <span class="risk-level ${llm.risk_level}">${llm.risk_level}</span>
        </div>
        ${riskPoints ? `<ul>${riskPoints}</ul>` : ''}
        ${llm.reasoning ? `<div class="reasoning">${llm.reasoning}</div>` : ''}
      </div>
    `;
  }

  div.innerHTML = `
    <h3>模式异常检测</h3>
    <div style="background:#0d1117;padding:12px;border-radius:6px;margin-bottom:12px;font-size:13px">
      <strong style="color:#3fb950">规则引擎: ${data.compliance_level}级</strong>（金额全部在限额内）
      <br><span style="color:#8b949e">但 AmbiguityDetector 检测到过去 ${data.history_count} 天的模式异常</span>
    </div>
    <div class="shield-metrics">
      <div class="shield-metric">
        <div class="label">Ambiguity Score</div>
        <div class="value">${amb.score.toFixed(1)}</div>
      </div>
      <div class="shield-metric">
        <div class="label">建议</div>
        <div class="value" style="font-size:14px">${amb.recommendation}</div>
      </div>
      <div class="shield-metric">
        <div class="label">触发因素</div>
        <div class="value" style="font-size:14px">${amb.triggered_factors.join(', ')}</div>
      </div>
    </div>
    <div class="shield-explanation">${amb.explanation}</div>
    ${llmHtml}
  `;
  container.appendChild(div);
}

function renderLogPanel(logs) {
  const div = document.createElement('div');
  div.className = 'log-panel';
  const entries = (logs || []).map(log => {
    const ts = (log.timestamp || '').slice(11, 19);
    return `<div class="log-entry">
      <span class="ts">${ts}</span>
      <span class="src">[${log.skill}]</span>
      <span class="msg">${log.detail || log.result}</span>
    </div>`;
  }).join('');
  div.innerHTML = `
    <h3>📜 中文处理日志</h3>
    <div class="log-entries">${entries || '<div class="log-entry">(无日志)</div>'}</div>
  `;
  return div;
}

// ═══════════════════════════════════════════════════════════════
// Run All
// ═══════════════════════════════════════════════════════════════

async function runAll() {
  const btn = document.getElementById('runAllBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 批量运行中...';

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('loading').classList.add('active');
  document.getElementById('results').style.display = 'none';

  try {
    const res = await fetch('/api/run_all', {method: 'POST'});
    const data = await res.json();
    renderRunAll(data.results);
  } catch (e) {
    document.getElementById('results').innerHTML = `<div class="error-box">批量运行失败: ${e.message}</div>`;
    document.getElementById('results').style.display = 'block';
  } finally {
    document.getElementById('loading').classList.remove('active');
    btn.disabled = false;
    btn.textContent = '⚡ 批量跑全部 7 个场景';
  }
}

function renderRunAll(results) {
  const container = document.getElementById('results');
  container.style.display = 'block';

  const rows = results.map(r => {
    const status = r.final_status;
    return `
      <tr style="border-bottom:1px solid #21262d">
        <td style="padding:10px 8px;color:#c9d1d9;font-weight:500">${r.title}</td>
        <td style="padding:10px 8px;text-align:right;color:#8b949e">${r.amount ? '¥'+r.amount.toFixed(2) : '-'}</td>
        <td style="padding:10px 8px;text-align:center">${r.employee_level || '-'}</td>
        <td style="padding:10px 8px;text-align:center">${r.total_ms ? r.total_ms.toFixed(1)+'ms' : '-'}</td>
        <td style="padding:10px 8px;text-align:center"><span class="final-status ${status}">${status.toUpperCase()}</span></td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <div class="report-card">
      <h3>⚡ 批量执行结果</h3>
      <table style="width:100%;margin-top:14px;font-size:12px;border-collapse:collapse">
        <thead>
          <tr style="border-bottom:2px solid #30363d;color:#8b949e;font-size:11px;text-transform:uppercase">
            <th style="padding:8px;text-align:left">场景</th>
            <th style="padding:8px;text-align:right">金额</th>
            <th style="padding:8px;text-align:center">员工</th>
            <th style="padding:8px;text-align:center">耗时</th>
            <th style="padding:8px;text-align:center">状态</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

document.getElementById('runBtn').addEventListener('click', runPreset);
document.getElementById('runAllBtn').addEventListener('click', runAll);
loadPresets();
